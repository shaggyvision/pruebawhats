<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy CRM Pro</title>

<link rel="stylesheet" href="style.css">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>
</head>

<body>

<div class="layout">

<aside class="sidebar">

<div class="logo">
<div class="logo-icon">💬</div>

<div>
<h2>Happy CRM</h2>
<span>AutoSend Pro</span>
</div>
</div>

<nav>

<a class="active">
<i class="fa-solid fa-chart-line"></i>
Dashboard
</a>

<a>
<i class="fa-solid fa-users"></i>
Contactos
</a>

<a>
<i class="fa-solid fa-paper-plane"></i>
Campañas
</a>

<a>
<i class="fa-brands fa-whatsapp"></i>
WhatsApp
</a>

<a>
<i class="fa-solid fa-gear"></i>
Configuración
</a>

</nav>

</aside>

<main class="main">

<header class="topbar">

<div>
<h1>Panel de Automatización</h1>
<p>Envía campañas masivas por WhatsApp</p>
</div>

<button class="green-btn">
<i class="fa-solid fa-plus"></i>
Nueva campaña
</button>

</header>


<section class="stats">

<div class="card">
<div class="card-top">
<span>Total Contactos</span>
<i class="fa-solid fa-users"></i>
</div>

<h2 id="totalContactos">0</h2>
</div>


<div class="card">
<div class="card-top">
<span>Mensajes Enviados</span>
<i class="fa-solid fa-paper-plane"></i>
</div>

<h2 id="enviados">0</h2>
</div>


<div class="card">
<div class="card-top">
<span>Errores</span>
<i class="fa-solid fa-circle-xmark"></i>
</div>

<h2 id="errores">0</h2>
</div>


<div class="card">
<div class="card-top">
<span>Estado API</span>
<i class="fa-brands fa-whatsapp"></i>
</div>

<h2 class="online">ONLINE</h2>
</div>

</section>


<section class="grid">

<div class="panel large-panel">

<div class="panel-header">
<h3>Crear Campaña</h3>
</div>

<label>Seleccionar plantilla</label>

<select id="plantilla">
<option value="cumple">🎂 Cumpleaños</option>
<option value="evento">🎉 Evento</option>
<option value="promo">🔥 Promoción</option>
</select>


<label>Mensaje</label>

<textarea id="mensaje"></textarea>


<div class="buttons">

<button class="green-btn" onclick="enviarATodos()">
<i class="fa-solid fa-paper-plane"></i>
Enviar campaña
</button>


<button class="dark-btn" onclick="cargarContactos()">
<i class="fa-solid fa-rotate"></i>
Actualizar contactos
</button>

</div>


<div class="progress-container">
<div class="progress-bar" id="progressBar"></div>
</div>

<div id="status" class="status"></div>

</div>


<div class="panel side-panel">

<div class="panel-header">
<h3>Vista previa</h3>
</div>

<div class="phone-preview">
<div class="chat-bubble" id="previewBox"></div>
</div>

</div>

</section>


<section class="bottom-grid">

<div class="panel">

<div class="panel-header">
<h3>Contactos</h3>
</div>

<table>

<thead>
<tr>
<th>Nombre</th>
<th>Número</th>
<th>Evento</th>
</tr>
</thead>

<tbody id="tablaContactos"></tbody>

</table>

</div>


<div class="panel">

<div class="panel-header">
<h3>Actividad</h3>
</div>

<div class="log" id="log"></div>

</div>

</section>

</main>

</div>

<script src="app.js"></script>
</body>
</html>
