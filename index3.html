<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy CRM AutoSend</title>

<style>
body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
    background:#1e293b;
    padding:25px;
    border-radius:20px;
}

h1{
    text-align:center;
    color:#22c55e;
}

textarea, select, button{
    width:100%;
    margin-top:15px;
    padding:15px;
    border:none;
    border-radius:12px;
    box-sizing:border-box;
}

textarea{
    background:#334155;
    color:white;
    height:180px;
    resize:none;
}

button{
    background:#22c55e;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}

.status{
    margin-top:20px;
    text-align:center;
    font-weight:bold;
}

.log{
    margin-top:20px;
    background:#0f172a;
    padding:15px;
    border-radius:12px;
    max-height:300px;
    overflow:auto;
    white-space:pre-wrap;
}
</style>
</head>
<body>

<div class="container">

<h1>📲 Happy CRM AutoSend</h1>

<select id="plantilla">
<option value="cumple">🎂 Cumpleaños</option>
<option value="evento">🎉 Evento</option>
<option value="promo">🔥 Promoción</option>
</select>

<textarea id="mensaje"></textarea>

<button onclick="enviarATodos()">
🚀 Enviar a TODOS los contactos
</button>

<div class="status" id="status"></div>

<div class="log" id="log"></div>

</div>

<script>

// =====================
// CONFIGURACIÓN
// =====================

const INSTANCE_ID = 'TU_INSTANCE';
const TOKEN = 'TU_TOKEN';

const SHEET_ID = '1iwg8R-yQbfPXoqkjVkLhZaTls7oaTdpEXvIdMx2yCXY';
const SHEET_NAME = 'happy';

// =====================
// PLANTILLAS
// =====================

const plantillas = {

cumple:
`🎂 ¡Feliz cumpleaños {nombre}!\n\nTe deseamos un excelente día lleno de alegría 🥳`,

evento:
`🎉 Hola {nombre}\n\nTe invitamos cordialmente a:\n{evento}\n\n¡Esperamos contar contigo! 😄`,

promo:
`🔥 Hola {nombre}\n\nTenemos promociones especiales para ti 😎`

};

const selectPlantilla = document.getElementById('plantilla');
const textarea = document.getElementById('mensaje');

textarea.value = plantillas.cumple;

selectPlantilla.addEventListener('change',()=>{

    textarea.value = plantillas[selectPlantilla.value];

});

// =====================
// ENVIAR A TODOS
// =====================

async function enviarATodos(){

    document.getElementById('status').innerText =
    '⏳ Cargando contactos...';

    try{

        const sheetURL =
        `https://opensheet.elk.sh/${SHEET_ID}/${SHEET_NAME}`;

        const response = await fetch(sheetURL);

        const contactos = await response.json();

        if(!contactos.length){

            document.getElementById('status').innerText =
            '⚠️ No hay contactos';

            return;
        }

        let enviados = 0;

        for(const contacto of contactos){

            let mensaje = textarea.value;

            mensaje = mensaje.replaceAll(
                '{nombre}',
                contacto.Nombre || ''
            );

            mensaje = mensaje.replaceAll(
                '{evento}',
                contacto.Evento || ''
            );

            const body = {
                token:TOKEN,
                to:contacto.Numero,
                body:mensaje
            };

            const url =
            `https://api.ultramsg.com/${INSTANCE_ID}/messages/chat`;

            try{

                const envio = await fetch(url,{
                    method:'POST',
                    headers:{
                        'Content-Type':'application/json'
                    },
                    body:JSON.stringify(body)
                });

                const data = await envio.json();

                console.log(data);

                enviados++;

                agregarLog(
                    `✅ Enviado a ${contacto.Nombre}`
                );

            }catch(error){

                agregarLog(
                    `❌ Error con ${contacto.Nombre}`
                );

            }

            await esperar(3000);

        }

        document.getElementById('status').innerText =
        `🚀 Mensajes enviados: ${enviados}`;

    }catch(error){

        console.error(error);

        document.getElementById('status').innerText =
        '❌ Error cargando contactos';

    }

}

// =====================
// UTILIDADES
// =====================

function esperar(ms){

    return new Promise(resolve=>setTimeout(resolve,ms));

}

function agregarLog(texto){

    const log = document.getElementById('log');

    log.innerHTML += texto + '<br>';

}

</script>

</body>
</html>
