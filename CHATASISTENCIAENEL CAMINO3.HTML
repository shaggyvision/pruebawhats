<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ADO Conductor — Asistencia en Ruta</title>
  <style>
    :root{
      --ado-red:#ED1C24;       /* rojo ADO aprox */
      --ado-purple:#5A2A7A;    /* morado ADO aprox */
      --bg:#0f0b16;
      --card:#141326;
      --bubble:#1b1a33;
      --accent:var(--ado-red);
      --accent-2:#7C4DFF;
      --text:#f2f3f5;
      --muted:#a6a8b1;
      --shadow:0 8px 24px rgba(0,0,0,.35);
      --radius:16px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:
        radial-gradient(1200px 800px at 80% -10%, rgba(90,42,122,.35) 0%, rgba(13,10,22,0) 40%),
        linear-gradient(180deg, #0c0a17 0%, #0a0915 100%);
      color:var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans";
      display:flex; align-items:center; justify-content:center;
      padding:16px;
    }
    .phone{
      width: min(440px, 100%);
      height: min(820px, 100vh - 32px);
      background: rgba(20,19,38,.75);
      backdrop-filter: blur(10px);
      border:1px solid rgba(255,255,255,.08);
      border-radius: 28px;
      box-shadow: var(--shadow);
      display:flex; flex-direction:column; overflow:hidden;
    }
    .header{
      padding:12px 14px;
      display:flex; align-items:center; gap:10px;
      border-bottom:1px solid rgba(255,255,255,.06);
      background: linear-gradient(180deg, rgba(237,28,36,.10), rgba(90,42,122,.10));
    }
    .brand{display:flex; align-items:center; gap:10px; min-width:0;}
    .brand img{
      width:50px; height:50px; object-fit:contain;
      filter: drop-shadow(0 2px 8px rgba(237,28,36,.35));
      background: white; border-radius:10px; padding:4px;
    }
    .title{font-weight:800; letter-spacing:.2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
    .subtitle{font-size:.82rem;color:var(--muted); line-height:1.15}
    .badge{
      margin-left:auto;
      padding:6px 10px; border-radius:999px; font-weight:700;
      background:linear-gradient(90deg, var(--ado-red), var(--ado-purple));
      color:white; font-size:.72rem; letter-spacing:.3px;
      box-shadow:0 6px 16px rgba(237,28,36,.35);
    }

    .chat{
      flex:1; overflow:auto; padding:16px 14px 8px; scroll-behavior:smooth;
      scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.25) transparent;
    }
    .row{display:flex;gap:10px;margin:10px 0;}
    .bot{justify-content:flex-start}
    .user{justify-content:flex-end}
    .bubble{
      max-width:85%;
      padding:12px 14px;
      border-radius:16px;
      background:var(--bubble);
      line-height:1.28;
      box-shadow:0 4px 12px rgba(0,0,0,.25);
      position:relative;
      animation:pop .18s ease-out both;
    }
    .bubble.bot{
      border-top-left-radius:8px;
      background: linear-gradient(180deg, rgba(27,26,51,1) 0%, rgba(17,16,36,1) 100%);
      border:1px solid rgba(255,255,255,.06);
    }
    .bubble.user{
      border-top-right-radius:8px;
      background: linear-gradient(180deg, rgba(237,28,36,.18), rgba(237,28,36,.08));
      border:1px solid rgba(237,28,36,.35);
    }
    @keyframes pop{from{transform:translateY(6px);opacity:0}to{transform:translateY(0);opacity:1}}

    .options{display:flex; flex-wrap:wrap; gap:10px; margin-top:10px}
    .btn{
      appearance:none; border:none; cursor:pointer;
      padding:12px 14px; border-radius:14px; font-weight:700;
      color:white; background:var(--accent);
      box-shadow:0 6px 16px rgba(237,28,36,.35);
      transition: transform .06s ease, filter .2s ease, box-shadow .2s ease;
      display:inline-flex; align-items:center; gap:10px;
    }
    .btn.secondary{
      background:var(--ado-purple);
      box-shadow:0 6px 16px rgba(122,76,180,.35);
    }
    .btn.ghost{
      background:transparent;color:var(--text);
      border:1px solid rgba(255,255,255,.15)
    }
    .btn:active{transform:scale(.98)}
    .footer{
      padding:10px 14px;
      border-top:1px solid rgba(255,255,255,.06);
      display:flex; justify-content:space-between; align-items:center;
      color:var(--muted); font-size:.84rem;
      background: linear-gradient(0deg, rgba(237,28,36,.10), transparent);
    }
    .hint{font-size:.82rem;color:var(--muted); margin-top:6px}
  </style>
</head>
<body>
  <div class="phone" role="application" aria-label="Chat de reporte">
    <div class="header">
      <div class="brand">
        <img
          src="https://cocktailmarketing.com.mx/wp-content/uploads/2018/04/mobility-ado-logo-mobilityado.png"
          alt="Mobility ADO - Logo" />
        <div>
          <div class="title">ADO Conductor — Asistencia en Ruta</div>
          <div class="subtitle">Accidentes y Atención Médica</div>
        </div>
      </div>
      <div class="badge">24/7</div>
    </div>

    <div id="chat" class="chat" aria-live="polite" aria-atomic="false"></div>

    <div class="footer">
      <div>Versión rápida · Offline</div>
      <div><span style="opacity:.65">Emergencias:</span> <strong>911</strong></div>
    </div>
  </div>

  <script>
    // === Configuración de destinos ===
    const NUM_ACCIDENTE_CALL = "8005571800";
    const NUM_MEDICO_CALL    = "5593029668";
    const WHATSAPP_CC        = "52";           // México
    const WHATSAPP_NUMBER    = "9932770093";   // sin + ni espacios
    const WHATS_E164         = WHATSAPP_CC + WHATSAPP_NUMBER;

    // Utilidades de UI
    const chat = document.getElementById("chat");

    function addBot(text, extraNode){
      const row = document.createElement("div");
      row.className = "row bot";
      const bub = document.createElement("div");
      bub.className = "bubble bot";
      bub.textContent = text;
      row.appendChild(bub);
      if (extraNode){ bub.appendChild(extraNode); }
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
    }

    function addUser(text){
      const row = document.createElement("div");
      row.className = "row user";
      const bub = document.createElement("div");
      bub.className = "bubble user";
      bub.textContent = text;
      row.appendChild(bub);
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
    }

    function makeOptions(buttons){
      const wrap = document.createElement("div");
      wrap.className = "options";
      buttons.forEach(b => {
        const btn = document.createElement("button");
        btn.className = "btn " + (b.variant || "");
        btn.type = "button";
        btn.innerHTML = b.icon ? (b.icon + b.label) : b.label;
        btn.addEventListener("click", b.onClick);
        wrap.appendChild(btn);
      });
      return wrap;
    }

    // Apertura de apps (teléfono y WhatsApp)
    function openTel(number){
      window.location.href = "tel:" + number.replace(/\s+/g,'');
    }

    // Enviar a WhatsApp con texto (y fallback a esquema nativo).
    function sendWhatsAppMessage(text){
      const url = "https://wa.me/" + WHATS_E164 + "?text=" + encodeURIComponent(text);
      window.location.href = url;
      setTimeout(() => {
        // algunos navegadores/ROMs prefieren el esquema nativo
        window.location.href = "whatsapp://send?phone=" + WHATS_E164 + "&text=" + encodeURIComponent(text);
      }, 600);
    }

    // Intenta adjuntar ubicación como enlace de Google Maps
    function sendWhatsAppWithLocation(){
      const baseMsg = "Tuve un percance en el camino, ¿me puedes ayudar?";

      // Aviso en la UI
      const hint = document.createElement("div");
      hint.className = "hint";
      hint.textContent = "Solicitando ubicación del dispositivo…";
      addBot("Un momento", hint);

      if (!("geolocation" in navigator)) {
        const txt = baseMsg + " (No se pudo adjuntar la ubicación. La puedes compartir dentro de WhatsApp).";
        sendWhatsAppMessage(txt);
        return;
      }

      const options = { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 };

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const { latitude, longitude } = pos.coords;
          const mapsLink = `https://www.google.com/maps?q=${latitude},${longitude}`;
          const txt = `${baseMsg} Aquí está mi ubicación: ${mapsLink}`;
          sendWhatsAppMessage(txt);
        },
        () => {
          const txt = baseMsg + " (No se pudo adjuntar la ubicación. La puedes compartir dentro de WhatsApp).";
          sendWhatsAppMessage(txt);
        },
        options
      );
    }

    // Flujo
    function start(){
      setTimeout(() => {
        addBot("¡Bienvenido! Soy tu asistente para conductores ADO.");
      }, 300);

      setTimeout(() => {
        const opts = makeOptions([
          {
            label:"🚧 Accidente",
            variant:"secondary",
            onClick: () => {
              addUser("Accidente");
              setTimeout(() => {
                const subOpts = makeOptions([
                  {
                    label:"📞 Llamada",
                    onClick: () => {
                      addUser("Llamar por accidente");
                      openTel(NUM_ACCIDENTE_CALL);
                    }
                  },
                  {
                    label:"💬 Mensaje (WhatsApp) con ubicación",
                    variant:"ghost",
                    onClick: () => {
                      addUser("Enviar mensaje por WhatsApp con ubicación");
                      sendWhatsAppWithLocation();
                    }
                  }
                ]);
                const hint = document.createElement("div");
                hint.className = "hint";
                hint.innerHTML = "• <strong>Llamada:</strong> 800 557 1800 &nbsp;• <strong>WhatsApp:</strong> +52 993 277 0093";
                const container = document.createElement("div");
                container.appendChild(subOpts);
                container.appendChild(hint);
                addBot("Seleccione cómo desea contactar:", container);
              }, 200);
            }
          },
          {
            label:"🩺 Médico",
            variant:"",
            onClick: () => {
              addUser("Médico");
              setTimeout(() => {
                addBot("Abriendo llamada a asistencia médica...");
                openTel(NUM_MEDICO_CALL);
              }, 150);
            }
          }
        ]);
        addBot("¿Qué desea reportar?", opts);
      }, 900);

      setTimeout(() => {
        const info = document.createElement("div");
        info.className = "hint";
        info.innerHTML = "Nota: para adjuntar ubicación automáticamente, abre este archivo bajo HTTPS o localhost. De lo contrario, podrás compartir la ubicación manualmente dentro de WhatsApp.";
        const wrap = document.createElement("div");
        wrap.appendChild(info);
        addBot("Información rápida", wrap);
      }, 1400);
    }

    window.addEventListener("load", start, { once:true });
  </script>
</body>
</html>
