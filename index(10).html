<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Moments CRM</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#f4f5fb;
margin:0;
padding:40px;
}

.container{
max-width:1200px;
margin:auto;
background:white;
padding:30px;
border-radius:24px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
color:#7e22ce;
margin-bottom:10px;
}

.card{
background:#faf7ff;
padding:20px;
border-radius:20px;
margin-top:20px;
}

input,textarea,select{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #ddd;
margin-top:10px;
margin-bottom:15px;
font-size:15px;
box-sizing:border-box;
}

button{
padding:14px 20px;
border:none;
background:#7e22ce;
color:white;
border-radius:14px;
cursor:pointer;
font-weight:600;
transition:.2s;
}

button:hover{
opacity:.9;
transform:scale(1.02);
}

.btn-delete{
background:#ef4444;
padding:10px 14px;
border-radius:10px;
font-size:13px;
}

.btn-test{
background:#22c55e;
margin-top:10px;
}

.preview{
margin-top:10px;
max-width:250px;
border-radius:16px;
display:none;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
padding:14px;
border-bottom:1px solid #eee;
text-align:left;
font-size:14px;
}

.status{
padding:10px;
border-radius:12px;
margin-top:15px;
font-size:14px;
font-weight:500;
display:none;
}

.success{
background:#dcfce7;
color:#166534;
}

.error{
background:#fee2e2;
color:#991b1b;
}

@media(max-width:768px){

body{
padding:15px;
}

table{
font-size:12px;
display:block;
overflow-x:auto;
}

}

</style>
</head>

<body>

<div class="container">

<h1>🎉 Happy Moments CRM</h1>

<div class="card">
<h2>UltraMSG conectado automáticamente</h2>
<p><b>Instancia:</b> instance174263</p>
</div>

<div class="card">

<h2>Agregar contacto</h2>

<input type="text" id="nombre" placeholder="Nombre">

<input type="text" id="telefono" placeholder="WhatsApp 521XXXXXXXXXX">

<select id="marca">
<option value="ADMIN">ADMIN</option>
<option value="ADO">ADO</option>
<option value="SUR">SUR</option>
<option value="TRT">TRT</option>
</select>

<select id="tipo">
<option value="cumpleaños">Cumpleaños</option>
<option value="aniversario">Aniversario</option>
</select>

<input type="date" id="fecha">

<button onclick="agregar()">Agregar contacto</button>

</div>

<div class="card">

<h2>Plantillas por marca</h2>

<label>ADMIN</label>
<textarea id="plantilla_ADMIN">🎉 Hola {nombre}, ADMIN te desea un excelente día.</textarea>

<label>ADO</label>
<textarea id="plantilla_ADO">🎉 Hola {nombre}, ADO te desea un excelente día.</textarea>

<label>SUR</label>
<textarea id="plantilla_SUR">🎉 Hola {nombre}, SUR te desea un excelente día.</textarea>

<label>TRT</label>
<textarea id="plantilla_TRT">🎉 Hola {nombre}, TRT te desea un excelente día.</textarea>

<input type="file" id="archivo" accept="image/*,video/*">

<img id="previewImagen" class="preview">

<video 
id="previewVideo"
class="preview"
controls
style="display:none;max-width:250px;border-radius:16px;">
</video>

<button onclick="guardarPlantillas()">
Guardar plantillas
</button>

<button class="btn-test" onclick="enviarPrueba()">
Enviar mensaje de prueba
</button>

<div id="estado" class="status"></div>

</div>

<div class="card">

<h2>Contactos</h2>

<table>

<thead>

<tr>
<th>Nombre</th>
<th>WhatsApp</th>
<th>Marca</th>
<th>Evento</th>
<th>Fecha</th>
<th>Acción</th>
</tr>

</thead>

<tbody id="tabla"></tbody>

</table>

</div>

</div>

<script>

const instance = 'instance174263';
const token = 'a7hqz1tofhwq65b4';

let contactos = JSON.parse(localStorage.getItem('contactos')) || [];

let archivoBase64 = localStorage.getItem('archivoPlantilla') || '';

let archivoTipo = localStorage.getItem('archivoTipo') || '';

const estado = document.getElementById('estado');

const previewImagen = document.getElementById('previewImagen');

const previewVideo = document.getElementById('previewVideo');

if(archivoBase64){

if(archivoTipo.startsWith('image')){

previewImagen.src = archivoBase64;
previewImagen.style.display='block';

}else if(archivoTipo.startsWith('video')){

previewVideo.src = archivoBase64;
previewVideo.style.display='block';

}

}

document.getElementById('plantilla_ADMIN').value =
localStorage.getItem('plantilla_ADMIN') ||
document.getElementById('plantilla_ADMIN').value;

document.getElementById('plantilla_ADO').value =
localStorage.getItem('plantilla_ADO') ||
document.getElementById('plantilla_ADO').value;

document.getElementById('plantilla_SUR').value =
localStorage.getItem('plantilla_SUR') ||
document.getElementById('plantilla_SUR').value;

document.getElementById('plantilla_TRT').value =
localStorage.getItem('plantilla_TRT') ||
document.getElementById('plantilla_TRT').value;

function mostrarEstado(texto,tipo){

estado.style.display='block';

estado.className=`status ${tipo}`;

estado.innerText=texto;

setTimeout(()=>{
estado.style.display='none';
},4000);

}

document.getElementById('archivo').addEventListener('change',function(e){

const file = e.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(event){

archivoBase64 = event.target.result;

archivoTipo = file.type;

localStorage.setItem('archivoPlantilla',archivoBase64);

localStorage.setItem('archivoTipo',archivoTipo);

previewImagen.style.display='none';
previewVideo.style.display='none';

if(file.type.startsWith('image')){

previewImagen.src = archivoBase64;
previewImagen.style.display='block';

}else if(file.type.startsWith('video')){

previewVideo.src = archivoBase64;
previewVideo.style.display='block';

}

mostrarEstado('Archivo guardado','success');

};

reader.readAsDataURL(file);

});

async function enviarWhatsApp(numero,mensaje){

try{

let response;

if(archivoBase64){

if(archivoTipo.startsWith('image')){

response = await fetch(`https://api.ultramsg.com/${instance}/messages/image`,{
method:'POST',
headers:{
'Content-Type':'application/x-www-form-urlencoded'
},
body:new URLSearchParams({
token:token,
to:numero,
image:archivoBase64,
caption:mensaje
})
});

}else if(archivoTipo.startsWith('video')){

response = await fetch(`https://api.ultramsg.com/${instance}/messages/video`,{
method:'POST',
headers:{
'Content-Type':'application/x-www-form-urlencoded'
},
body:new URLSearchParams({
token:token,
to:numero,
video:archivoBase64,
caption:mensaje
})
});

}

}else{

response = await fetch(`https://api.ultramsg.com/${instance}/messages/chat`,{
method:'POST',
headers:{
'Content-Type':'application/x-www-form-urlencoded'
},
body:new URLSearchParams({
token:token,
to:numero,
body:mensaje
})
});

}

const data = await response.json();

console.log(data);

return true;

}catch(error){

console.log(error);

return false;

}

}

async function agregar(){

const nombre = document.getElementById('nombre').value.trim();

const telefono = document.getElementById('telefono').value.trim();

const marca = document.getElementById('marca').value;

const tipo = document.getElementById('tipo').value;

const fecha = document.getElementById('fecha').value;

if(!nombre || !telefono || !fecha){

mostrarEstado('Completa todos los campos','error');

return;

}

contactos.push({
nombre,
telefono,
marca,
tipo,
fecha
});

localStorage.setItem('contactos',JSON.stringify(contactos));

render();

const plantilla = localStorage.getItem(`plantilla_${marca}`);

const mensaje = plantilla.replace('{nombre}',nombre);

const enviado = await enviarWhatsApp(telefono,mensaje);

if(enviado){

mostrarEstado('Contacto agregado y mensaje enviado','success');

}else{

mostrarEstado('Contacto agregado pero hubo error enviando mensaje','error');

}

document.getElementById('nombre').value='';
document.getElementById('telefono').value='';
document.getElementById('fecha').value='';

}

function eliminarContacto(index){

if(confirm('¿Eliminar este contacto?')){

contactos.splice(index,1);

localStorage.setItem('contactos',JSON.stringify(contactos));

render();

mostrarEstado('Contacto eliminado','success');

}

}

function render(){

const tabla = document.getElementById('tabla');

tabla.innerHTML='';

if(contactos.length===0){

tabla.innerHTML=`
<tr>
<td colspan="6">No hay contactos registrados</td>
</tr>
`;

return;

}

contactos.forEach((c,index)=>{

tabla.innerHTML += `
<tr>

<td>${c.nombre}</td>

<td>${c.telefono}</td>

<td>${c.marca}</td>

<td>${c.tipo}</td>

<td>${c.fecha}</td>

<td>
<button 
class="btn-delete"
onclick="eliminarContacto(${index})">
🗑️ Eliminar
</button>
</td>

</tr>
`;

});

}

function guardarPlantillas(){

localStorage.setItem(
'plantilla_ADMIN',
document.getElementById('plantilla_ADMIN').value
);

localStorage.setItem(
'plantilla_ADO',
document.getElementById('plantilla_ADO').value
);

localStorage.setItem(
'plantilla_SUR',
document.getElementById('plantilla_SUR').value
);

localStorage.setItem(
'plantilla_TRT',
document.getElementById('plantilla_TRT').value
);

mostrarEstado('Plantillas guardadas','success');

}

async function enviarPrueba(){

const telefono = prompt('Ingresa un número para prueba');

if(!telefono) return;

const marca = prompt('Marca: ADMIN / ADO / SUR / TRT');

if(!marca) return;

const plantilla = localStorage.getItem(`plantilla_${marca}`);

const mensaje = plantilla.replace('{nombre}','Usuario');

const enviado = await enviarWhatsApp(telefono,mensaje);

if(enviado){

mostrarEstado('Mensaje de prueba enviado','success');

}else{

mostrarEstado('Error enviando prueba','error');

}

}

function verificarEventos(){

const hoy = new Date();

const mes = String(hoy.getMonth()+1).padStart(2,'0');

const dia = String(hoy.getDate()).padStart(2,'0');

const hoyFormato = `${mes}-${dia}`;

contactos.forEach(async contacto=>{

const fecha = contacto.fecha.substring(5);

const llaveEnvio = `enviado_${contacto.telefono}_${hoyFormato}`;

if(fecha === hoyFormato && !localStorage.getItem(llaveEnvio)){

const plantilla = localStorage.getItem(
`plantilla_${contacto.marca}`
);

const mensaje = plantilla.replace(
'{nombre}',
contacto.nombre
);

await enviarWhatsApp(
contacto.telefono,
mensaje
);

localStorage.setItem(llaveEnvio,'si');

console.log(
'Mensaje enviado a',
contacto.nombre
);

}

});

}

setInterval(verificarEventos,60000);

render();

</script>

</body>
</html>
