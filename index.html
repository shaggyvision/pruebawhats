<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Happy Moments</title>

<style>
body{font-family:sans-serif;background:#f4f5fb;padding:20px;}
.container{max-width:1000px;margin:auto;background:white;padding:20px;border-radius:20px;}

.banner img{
  width:100%;
  height:160px;
  object-fit:contain;
  border-radius:12px;
}

.tabs{display:flex;gap:10px;margin-bottom:20px;justify-content:center;}
.tab{padding:10px 15px;background:#ddd;border-radius:8px;cursor:pointer;}
.tab.active{background:#7e22ce;color:white;}

.section{display:none;}
.section.active{display:block;}

input, textarea, select{
  width:100%;
  padding:10px;
  margin-top:10px;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}
.save{background:#7e22ce;}
.send{background:#16a34a;}
.delete{background:#dc2626;}
.sheet{background:#15803d;}

table{width:100%;margin-top:20px;border-collapse:collapse;}
td,th{padding:10px;border-bottom:1px solid #ddd;}

#contenedorGaleria{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:10px;
}
#contenedorGaleria img,#contenedorGaleria video{
  width:100%;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="banner">
  <img src="https://shaggyvision.github.io/pruebawhats/logo.png">
</div>

<div class="tabs">
  <div class="tab active" data-tab="contacto">Contacto</div>
  <div class="tab" data-tab="plantilla">Plantilla</div>
  <div class="tab" data-tab="lista">Contactos</div>
  <div class="tab" data-tab="plantillas">Plantillas</div>
  <div class="tab" data-tab="galeria">Galería</div>
</div>

<!-- CONTACTO -->
<div id="contacto" class="section active">
<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="Teléfono">
<select id="marca"><option>ADMIN</option><option>ADO</option></select>
<input type="date" id="fecha">

<div style="display:flex;justify-content:space-between;">
<button class="save" onclick="agregarContacto()">Guardar</button>
<button class="sheet" onclick="window.open('https://docs.google.com/spreadsheets/d/1nojKLQL2J4OZlrf2zxPHWuSwagHR8etSYrC7Pvrus4g/edit')">Sheets</button>
</div>
</div>

<!-- CONTACTOS -->
<div id="lista" class="section">
<table><tbody id="tabla"></tbody></table>
</div>

<!-- PLANTILLAS -->
<div id="plantillas" class="section">
<table><tbody id="tablaPlantillas"></tbody></table>
</div>

<!-- GALERIA -->
<div id="galeria" class="section">
<div id="contenedorGaleria"></div>
</div>

</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbzUX-hDUuKcj_we3d9GHsT8MCm0W0Er-nYKHqZsZigpmk1S6zWAuYMtPiFRV4uDjc0m/exec";

let contactos=[],galeria=[];

//////////////////////////////////////////////////
// ✅ TABS SIEMPRE FUNCIONAN
//////////////////////////////////////////////////
document.addEventListener("DOMContentLoaded", ()=>{

document.querySelectorAll(".tab").forEach(tab=>{
tab.onclick=()=>{

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
tab.classList.add("active");

document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(tab.dataset.tab).classList.add("active");

};
});

// ✅ cargar sin romper sistema
cargarContactos();
cargarGaleria();

});

//////////////////////////////////////////////////
// CONTACTOS
//////////////////////////////////////////////////
async function cargarContactos(){
try{
let r=await fetch(SCRIPT_URL);
contactos=await r.json();
render();
}catch(e){console.log("Error contactos");}
}

function render(){
let t=document.getElementById("tabla");
if(!t) return;

t.innerHTML="";
contactos.forEach(c=>{
t.innerHTML+=`<tr><td>${c.nombre}</td></tr>`;
});
}

//////////////////////////////////////////////////
// ✅ GALERIA SEGURA (NO ROMPE SISTEMA)
//////////////////////////////////////////////////
async function cargarGaleria(){
try{
let r=await fetch(SCRIPT_URL+"?tipo=galeria");
galeria=await r.json();
renderGaleria();
}catch(e){
console.log("Galería no disponible");
}
}

function renderGaleria(){

let cont=document.getElementById("contenedorGaleria");
if(!cont) return;

cont.innerHTML="";

galeria.forEach(item=>{

if(item.tipo.includes("image")){
cont.innerHTML+=`<img src="${item.urlpo.includes("video")){
cont.innerHTML+=`<video src="${ideo>`;
}

});
}

// ✅ función dummy para evitar errores
function agregarContacto(){
alert("Funciona ✅");
}

</script>

</body>
</html>
