<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Happy Moments</title>

<style>
body{font-family:sans-serif;background:#f4f5fb;padding:20px;}
.container{max-width:1000px;margin:auto;background:white;padding:20px;border-radius:20px;}
.banner img{width:100%;height:160px;object-fit:contain;border-radius:12px;}
.tabs{display:flex;gap:10px;margin-bottom:20px;justify-content:center;}
.tab{padding:10px 15px;background:#ddd;cursor:pointer;border-radius:8px;}
.tab.active{background:#7e22ce;color:white;}
.section{display:none;}
.section.active{display:block;}
input, textarea, select{width:100%;padding:10px;margin-top:10px;}
button{padding:10px;border:none;cursor:pointer;border-radius:8px;color:white;display:flex;align-items:center;gap:6px;}
.save{background:#7e22ce;}
.send{background:#16a34a;}
.delete{background:#dc2626;}
.sheet{background:#15803d;}
table{width:100%;margin-top:20px;border-collapse:collapse;}
td,th{padding:10px;border-bottom:1px solid #ddd;}
</style>
</head>

<body>

<div class="container">

<div class="banner">
<img src="https://shaggyvision.github.io/pruebawhats/logo.png">
</div>

<div class="tabs">
<div class="tab active" data-tab="contacto">Contacto</div>
<div class="tab" data-tab="plantilla">Plantilla</div>
<div class="tab" data-tab="lista">Contactos</div>
<div class="tab" data-tab="plantillas">Plantillas</div>
</div>

<!-- CONTACTO -->
<div id="contacto" class="section active">
<h3>Agregar contacto</h3>

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="521XXXXXXXXXX">

<select id="marca">
<option>ADMIN CUMPLEAÑOS</option>
<option>ADMIN ANIVERSARIO</option>
<option>ADMIN RECONOCIMIENTO</option>
<option>ADO CUMPLEAÑOS</option>
<option>ADO ANIVERSARIO</option>
<option>ADO RECONOCIMIENTO</option>
<option>SUR CUMPLEAÑOS</option>
<option>SUR ANIVERSARIO</option>
<option>SUR RECONOCIMIENTO</option>
<option>TRT CUMPLEAÑOS</option>
<option>TRT ANIVERSARIO</option>
<option>TRT RECONOCIMIENTO</option>
<option>GERENTE CUMPLEAÑOS</option>
<option>GERENTE ANIVERSARIO</option>
<option>GERENTE RECONOCIMIENTO</option>
</select>

<input type="date" id="fecha">

<button class="save" onclick="agregarContacto()">✅ Guardar</button>
</div>

<!-- PLANTILLA -->
<div id="plantilla" class="section">
<h3>Crear plantilla</h3>

<select id="marcaPlantilla">
<option>ADMIN CUMPLEAÑOS</option>
<option>ADMIN ANIVERSARIO</option>
<option>ADMIN RECONOCIMIENTO</option>
<option>ADO CUMPLEAÑOS</option>
<option>ADO ANIVERSARIO</option>
<option>ADO RECONOCIMIENTO</option>
<option>SUR CUMPLEAÑOS</option>
<option>SUR ANIVERSARIO</option>
<option>SUR RECONOCIMIENTO</option>
<option>TRT CUMPLEAÑOS</option>
<option>TRT ANIVERSARIO</option>
<option>TRT RECONOCIMIENTO</option>
<option>GERENTE CUMPLEAÑOS</option>
<option>GERENTE ANIVERSARIO</option>
<option>GERENTE RECONOCIMIENTO</option>
</select>

<textarea id="textoPlantilla">Hola {Nombre}</textarea>
<input id="urlMedia" placeholder="URL imagen/video">

<button class="save" onclick="guardarPlantilla()">💾 Guardar plantilla</button>
</div>

<!-- CONTACTOS -->
<div id="lista" class="section">
<h3>Contactos</h3>
<table>
<thead>
<tr>
<th>Nombre</th>
<th>Teléfono</th>
<th>Área</th>
<th>Fecha</th>
<th>Acción</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<!-- PLANTILLAS -->
<div id="plantillas" class="section">
<h3>Plantillas</h3>
<table>
<thead>
<tr>
<th>Área</th>
<th>Mensaje</th>
<th>Media</th>
<th>Acción</th>
</tr>
</thead>
<tbody id="tablaPlantillas"></tbody>
</table>
</div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzUX-hDUuKcj_we3d9GHsT8MCm0W0Er-nYKHqZsZigpmk1S6zWAuYMtPiFRV4uDjc0m/exec";

let contactos = [];
let plantillas = [];

document.addEventListener("DOMContentLoaded", () => {
document.querySelectorAll(".tab").forEach(tab=>{
tab.addEventListener("click", function(){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
this.classList.add("active");
let id = this.dataset.tab;
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
});
});

cargarContactos();
cargarPlantillas();
});

//////////////////////////////////////////////////

async function cargarContactos(){
let res = await fetch(SCRIPT_URL);
contactos = await res.json();
render();
}

async function agregarContacto(){
let nombre = nombre.value;
let telefono = telefono.value;
let marca = marca.value;
let fecha = fecha.value;

await fetch(SCRIPT_URL,{
method:"POST",
headers:{'Content-Type':'text/plain'},
body:JSON.stringify({nombre,telefono,marca,fecha})
});

alert("Guardado");
cargarContactos();
}

//////////////////////////////////////////////////

async function cargarPlantillas(){
let res = await fetch(SCRIPT_URL + "?tipo=plantillas");
plantillas = await res.json();
renderPlantillas();
}

async function guardarPlantilla(){
let marca = marcaPlantilla.value;
let plantilla = textoPlantilla.value;
let archivo = urlMedia.value;

await fetch(SCRIPT_URL,{
method:"POST",
headers:{'Content-Type':'text/plain'},
body:JSON.stringify({
tipoOperacion:"guardarPlantilla",
marca,
plantilla,
archivoURLmanual:archivo
})
});

alert("Plantilla guardada");
cargarPlantillas();
}

//////////////////////////////////////////////////

function render(){
let t = document.getElementById("tabla");
t.innerHTML = "";

contactos.forEach(c=>{
t.innerHTML += `
<tr>
<td>${c.nombre}</td>
<td>${c.telefono}</td>
<td>${c.marca}</td>
<td>${c.fecha}</td>
<td>
<button class="delete" onclick="borrarContacto('${c.telefono}')">🗑</button>
</td>
</tr>`;
});
}

function renderPlantillas(){
let t = document.getElementById("tablaPlantillas");
t.innerHTML = "";

plantillas.forEach(p=>{
t.innerHTML += `
<tr>
<td>${p.marca}</td>
<td>${p.plantilla}</td>
<td>${p.archivoURLmanual || ''}</td>
<td>
<button class="delete" onclick="borrarPlantilla('${p.marca}')">🗑</button>
</td>
</tr>`;
});
}

//////////////////////////////////////////////////

async function borrarContacto(telefono){
await fetch(SCRIPT_URL,{
method:"POST",
headers:{'Content-Type':'text/plain'},
body:JSON.stringify({accion:"borrar",telefono})
});
cargarContactos();
}

async function borrarPlantilla(marca){
await fetch(SCRIPT_URL,{
method:"POST",
headers:{'Content-Type':'text/plain'},
body:JSON.stringify({tipoOperacion:"borrarPlantilla",marca})
});
cargarPlantillas();
}

</script>

</body>
</html>
