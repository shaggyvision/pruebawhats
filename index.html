<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Moments CRM</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#f4f5fb;
margin:0;
padding:40px;
}

.container{
max-width:1300px;
margin:auto;
background:white;
padding:30px;
border-radius:24px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
color:#7e22ce;
}

.card{
background:#faf7ff;
padding:20px;
border-radius:20px;
margin-top:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.marca-box{
background:white;
padding:16px;
border-radius:18px;
border:1px solid #eee;
}

input,textarea,select{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #ddd;
margin-top:10px;
margin-bottom:15px;
font-size:15px;
box-sizing:border-box;
}

button{
padding:14px 20px;
border:none;
background:#7e22ce;
color:white;
border-radius:14px;
cursor:pointer;
font-weight:600;
margin-top:10px;
}

button:hover{
opacity:.95;
}

.preview{
width:100%;
max-height:220px;
object-fit:cover;
border-radius:14px;
margin-top:10px;
display:none;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
padding:14px;
border-bottom:1px solid #eee;
text-align:left;
font-size:14px;
}

.status{
padding:12px;
border-radius:12px;
margin-top:15px;
display:none;
font-weight:500;
}

.success{
background:#dcfce7;
color:#166534;
}

.error{
background:#fee2e2;
color:#991b1b;
}

</style>
</head>

<body>

<div class="container">

<h1>🎉 Happy Moments</h1>

<div class="card">

<h2>Agregar contacto</h2>

<input type="text" id="nombre" placeholder="Nombre">

<input type="text" id="telefono" placeholder="WhatsApp 521XXXXXXXXXX">

<select id="marca">
<option value="ADMIN">ADMIN</option>
<option value="ADO">ADO</option>
<option value="SUR">SUR</option>
<option value="TRT">TRT</option>
</select>

<select id="tipo">
<option value="cumpleaños">Cumpleaños</option>
<option value="aniversario">Aniversario</option>
</select>

<input type="date" id="fecha">

<button onclick="agregarContacto()">
Agregar contacto
</button>

<div id="estado" class="status"></div>

</div>

<div class="card">

<h2>Plantillas</h2>

<div class="grid">

<div class="marca-box">
<h3>ADMIN</h3>
<textarea id="plantilla_ADMIN"></textarea>
<input type="file" id="archivo_ADMIN" accept="image/*,video/*">
<img id="img_ADMIN" class="preview">
<video id="video_ADMIN" class="preview" controls></video>
</div>

<div class="marca-box">
<h3>ADO</h3>
<textarea id="plantilla_ADO"></textarea>
<input type="file" id="archivo_ADO" accept="image/*,video/*">
<img id="img_ADO" class="preview">
<video id="video_ADO" class="preview" controls></video>
</div>

<div class="marca-box">
<h3>SUR</h3>
<textarea id="plantilla_SUR"></textarea>
<input type="file" id="archivo_SUR" accept="image/*,video/*">
<img id="img_SUR" class="preview">
<video id="video_SUR" class="preview" controls></video>
</div>

<div class="marca-box">
<h3>TRT</h3>
<textarea id="plantilla_TRT"></textarea>
<input type="file" id="archivo_TRT" accept="image/*,video/*">
<img id="img_TRT" class="preview">
<video id="video_TRT" class="preview" controls></video>
</div>

</div>

<button onclick="guardarPlantillas()">
Guardar plantillas
</button>

</div>

<div class="card">

<h2>Contactos</h2>

<table>

<thead>
<tr>
<th>Nombre</th>
<th>WhatsApp</th>
<th>Marca</th>
<th>Evento</th>
<th>Fecha</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

</div>

</div>

<script>

const SCRIPT_URL =
'https://script.google.com/macros/s/AKfycbzUX-hDUuKcj_we3d9GHsT8MCm0W0Er-nYKHqZsZigpmk1S6zWAuYMtPiFRV4uDjc0m/exec';

const instance = 'instance174263';

const token = 'a7hqz1tofhwq65b4';

let contactos = [];

let archivos = {};

let tipos = {};

function mostrarEstado(texto,tipo){

const estado =
document.getElementById('estado');

estado.style.display='block';

estado.className=`status ${tipo}`;

estado.innerText=texto;

setTimeout(()=>{
estado.style.display='none';
},4000);

}

async function cargarContactos(){

try{

const response =
await fetch(
SCRIPT_URL + '?t=' + new Date().getTime()
);

contactos = await response.json();

render();

}catch(error){

console.log(error);

mostrarEstado(
'Error cargando contactos',
'error'
);

}

}

async function cargarPlantillas(){

try{

const response =
await fetch(
SCRIPT_URL +
'?tipo=plantillas&t=' +
new Date().getTime()
);

const plantillas =
await response.json();

plantillas.forEach(p=>{

document.getElementById(
`plantilla_${p.marca}`
).value = p.plantilla || '';

if(p.archivo){

if(
p.archivo.includes('.mp4')
){

const video =
document.getElementById(
`video_${p.marca}`
);

video.src = p.archivo;

video.style.display='block';

}else{

const img =
document.getElementById(
`img_${p.marca}`
);

img.src = p.archivo;

img.style.display='block';

}

}

});

}catch(error){

console.log(error);

}

}

async function agregarContacto(){

const nombre =
document.getElementById('nombre').value;

const telefono =
document.getElementById('telefono').value;

const marca =
document.getElementById('marca').value;

const tipo =
document.getElementById('tipo').value;

const fecha =
document.getElementById('fecha').value;

try{

await fetch(SCRIPT_URL,{

method:'POST',

headers:{
'Content-Type':'text/plain;charset=utf-8'
},

body:JSON.stringify({
nombre,
telefono,
marca,
tipo,
fecha
})

});

mostrarEstado(
'Contacto guardado',
'success'
);

document.getElementById('nombre').value='';
document.getElementById('telefono').value='';
document.getElementById('fecha').value='';

setTimeout(()=>{
cargarContactos();
},1000);

}catch(error){

console.log(error);

mostrarEstado(
'Error guardando contacto',
'error'
);

}

}

['ADMIN','ADO','SUR','TRT']
.forEach(marca=>{

document
.getElementById(`archivo_${marca}`)
.addEventListener('change',function(e){

const file = e.target.files[0];

if(!file) return;

tipos[marca] = file.type;

const reader = new FileReader();

reader.onload = function(event){

archivos[marca] =
event.target.result;

if(file.type.startsWith('image')){

const img =
document.getElementById(
`img_${marca}`
);

img.src =
event.target.result;

img.style.display='block';

document.getElementById(
`video_${marca}`
).style.display='none';

}else{

const video =
document.getElementById(
`video_${marca}`
);

video.src =
event.target.result;

video.style.display='block';

document.getElementById(
`img_${marca}`
).style.display='none';

}

};

reader.readAsDataURL(file);

});

});

async function guardarPlantillas(){

try{

mostrarEstado(
'Guardando plantillas...',
'success'
);

const marcas =
['ADMIN','ADO','SUR','TRT'];

for(const marca of marcas){

const plantilla =
document.getElementById(
`plantilla_${marca}`
).value;

const archivoBase64 =
archivos[marca] || '';

const nombreArchivo =
`${marca}_${Date.now()}`;

const response = await fetch(SCRIPT_URL,{

method:'POST',

headers:{
'Content-Type':'text/plain;charset=utf-8'
},

body:JSON.stringify({

tipoOperacion:'guardarPlantilla',

marca:marca,

plantilla:plantilla,

archivoBase64:archivoBase64,

nombreArchivo:nombreArchivo

})

});

const data = await response.json();

console.log(data);

if(!data.success){

throw new Error(
data.error || 'Error guardando'
);

}

}

mostrarEstado(
'Plantillas guardadas correctamente',
'success'
);

setTimeout(()=>{
cargarPlantillas();
},1500);

}catch(error){

console.log(error);

mostrarEstado(
'Error guardando plantillas',
'error'
);

}

}

function render(){

const tabla =
document.getElementById('tabla');

tabla.innerHTML='';

if(contactos.length===0){

tabla.innerHTML=`
<tr>
<td colspan="5">
No hay contactos
</td>
</tr>
`;

return;

}

contactos.forEach(c=>{

tabla.innerHTML += `
<tr>

<td>${c.nombre || ''}</td>

<td>${c.telefono || ''}</td>

<td>${c.marca || ''}</td>

<td>${c.tipo || ''}</td>

<td>${c.fecha || ''}</td>

</tr>
`;

});

}

cargarContactos();

cargarPlantillas();

setInterval(cargarContactos,30000);

</script>

</body>
</html>
