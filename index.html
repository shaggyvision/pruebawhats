<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Happy Moments</title>

<style>
body{font-family:sans-serif;background:#f4f5fb;padding:40px;}
.container{max-width:1100px;margin:auto;background:white;padding:30px;border-radius:20px;}
input, textarea, select{width:100%;padding:12px;margin-top:10px;}
button{padding:10px;background:#7e22ce;color:white;border:none;margin-top:10px;cursor:pointer;border-radius:8px;}
.delete{background:#dc2626;}
.table-btn{display:flex;gap:5px;}
table{width:100%;margin-top:20px;border-collapse:collapse;}
td,th{padding:10px;border-bottom:1px solid #ddd;}
.status{padding:10px;margin-top:10px;display:none;}
.success{background:#dcfce7;}
.error{background:#fee2e2;}
</style>
</head>

<body>

<div class="container">

<h1>🎉 CRM Happy Moments PRO</h1>

<!-- ================= CONTACTO ================= -->
<h2>Agregar contacto</h2>

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="521XXXXXXXXXX">

<select id="marca_contacto">
<option>ADMIN</option>
<option>ADO</option>
<option>SUR</option>
<option>TRT</option>
</select>

<input type="date" id="fecha">

<button onclick="agregarContacto()">Guardar contacto</button>

<div id="estado" class="status"></div>

<!-- ================= PLANTILLA ================= -->
<h2>Crear plantilla</h2>

<label>Selecciona área de la plantilla:</label>
<select id="marca_plantilla">
<option>ADMIN</option>
<option>ADO</option>
<option>SUR</option>
<option>TRT</option>
</select>

<textarea id="plantilla">🎉 Hola {Nombre}, feliz cumpleaños 🎉</textarea>

<input type="text" id="archivoURL" placeholder="Pega URL de imagen o video (Drive)">

<button onclick="guardarPlantilla()">Guardar plantilla</button>

<!-- ================= TABLA ================= -->
<h2>Contactos</h2>

<table>
<thead>
<tr>
<th>Nombre</th>
<th>Teléfono</th>
<th>Área</th>
<th>Fecha</th>
<th>Acción</th>
</tr>
</thead>

<tbody id="tabla"></tbody>
</table>

</div>

<script>

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzUX-hDUuKcj_we3d9GHsT8MCm0W0Er-nYKHqZsZigpmk1S6zWAuYMtPiFRV4uDjc0m/exec';

const instance = 'instance174263';
const token = 'a7hqz1tofhwq65b4';

let contactos = [];
let plantillas = [];

//////////////////////////////////////////////
function mostrarEstado(texto,tipo){
let e = document.getElementById('estado');
e.style.display='block';
e.className=`status ${tipo}`;
e.innerText=texto;
setTimeout(()=>{e.style.display='none';},4000);
}

//////////////////////////////////////////////
// ✅ CARGAR DATOS
//////////////////////////////////////////////
async function cargarContactos(){
let res = await fetch(SCRIPT_URL);
contactos = await res.json();
render();
}

async function cargarPlantillas(){
let res = await fetch(SCRIPT_URL+'?tipo=plantillas');
plantillas = await res.json();
}

//////////////////////////////////////////////
// ✅ AGREGAR CONTACTO
//////////////////////////////////////////////
async function agregarContacto(){

let nombre = document.getElementById('nombre').value;
let telefono = document.getElementById('telefono').value;
let marca = document.getElementById('marca_contacto').value;
let fecha = document.getElementById('fecha').value;

await fetch(SCRIPT_URL,{
method:'POST',
headers:{'Content-Type':'text/plain'},
body:JSON.stringify({nombre,telefono,marca,fecha})
});

mostrarEstado('Contacto guardado ✅','success');

setTimeout(cargarContactos,800);
}

//////////////////////////////////////////////
// ✅ BORRAR
//////////////////////////////////////////////
async function borrarContacto(telefono){

if(!confirm("¿Eliminar contacto?")) return;

await fetch(SCRIPT_URL,{
method:'POST',
headers:{'Content-Type':'text/plain'},
body:JSON.stringify({accion:'borrar',telefono})
});

cargarContactos();
}

//////////////////////////////////////////////
// ✅ GUARDAR PLANTILLA (CORREGIDO)
//////////////////////////////////////////////
async function guardarPlantilla(){

let marca = document.getElementById('marca_plantilla').value;
let plantilla = document.getElementById('plantilla').value;
let archivoURL = document.getElementById('archivoURL').value;

await fetch(SCRIPT_URL,{
method:'POST',
headers:{'Content-Type':'text/plain'},
body:JSON.stringify({
tipoOperacion:'guardarPlantilla',
marca:marca,
plantilla:plantilla,
archivoURLmanual:archivoURL
})
});

mostrarEstado('Plantilla guardada ✅','success');

cargarPlantillas();
}

//////////////////////////////////////////////
// ✅ GENERAR MENSAJE
//////////////////////////////////////////////
function generarMensaje(nombre,marca){

let p = plantillas.find(x=>x.marca === marca);

if(!p) return "Hola " + nombre;

return p.plantilla.replace('{Nombre}',nombre);
}

//////////////////////////////////////////////
// ✅ WHATSAPP
//////////////////////////////////////////////
async function enviarWhatsApp(telefono,mensaje,media){

if(media){
await fetch(`https://api.ultramsg.com/${instance}/messages/image`,{
method:'POST',
headers:{'Content-Type':'application/x-www-form-urlencoded'},
body:new URLSearchParams({
token:token,
to:telefono,
image:media,
caption:mensaje
})
});
}else{
await fetch(`https://api.ultramsg.com/${instance}/messages/chat`,{
method:'POST',
headers:{'Content-Type':'application/x-www-form-urlencoded'},
body:new URLSearchParams({
token:token,
to:telefono,
body:mensaje
})
});
}
}

//////////////////////////////////////////////
// ✅ ENVÍO AUTOMÁTICO 🎂
//////////////////////////////////////////////
function envioAutomatico(){

let hoy = new Date().toISOString().split('T')[0];

contactos.forEach(c=>{

if(c.fecha === hoy){

let media = (plantillas.find(p=>p.marca === c.marca)||{}).archivo;

enviarWhatsApp(
c.telefono,
generarMensaje(c.nombre,c.marca),
media
);

}

});

}

//////////////////////////////////////////////
// ✅ TABLA
//////////////////////////////////////////////
function render(){

let tabla = document.getElementById('tabla');
tabla.innerHTML='';

contactos.forEach(c=>{

tabla.innerHTML+=`
<tr>
<td>${c.nombre}</td>
<td>${c.telefono}</td>
<td>${c.marca}</td>
<td>${c.fecha}</td>
<td>
<div class="table-btn">
<button onclick="enviarAhora('${c.telefono}','${c.nombre}','${c.marca}')">📲</button>
<button class="delete" onclick="borrarContacto('${c.telefono}')">🗑</button>
</div>
</td>
</tr>
`;
});

}

async function enviarAhora(t,n,m){

let media = (plantillas.find(p=>p.marca === m)||{}).archivo;

await enviarWhatsApp(t,generarMensaje(n,m),media);

mostrarEstado('Enviado ✅','success');
}

//////////////////////////////////////////////
window.onload=()=>{
cargarContactos();
cargarPlantillas();
setInterval(envioAutomatico,60000);
};

</script>

</body>
</html>
