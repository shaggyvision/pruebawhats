<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Happy Moments</title>

<style>
body{font-family:sans-serif;background:#f4f5fb;padding:20px;}
.container{max-width:1000px;margin:auto;background:white;padding:20px;border-radius:20px;}

.banner img{
  width:100%;
  height:160px;
  object-fit:contain;
  border-radius:12px;
}

/* Tabs */
.tabs{display:flex;gap:10px;margin:20px 0;justify-content:center;}
.tab{padding:10px 15px;background:#ddd;border-radius:8px;cursor:pointer;}
.tab.active{background:#7e22ce;color:white;}

/* Secciones */
.section{display:none;}
.section.active{display:block;}

input, textarea, select{
  width:100%;
  padding:10px;
  margin-top:10px;
}

/* Botones */
button{
  padding:10px;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}
.save{background:#7e22ce;}
.send{background:#16a34a;}
.delete{background:#dc2626;}
.sheet{background:#15803d;}

table{width:100%;margin-top:15px;border-collapse:collapse;}
td,th{padding:10px;border-bottom:1px solid #ddd;}

/* GALERIA */
#contenedorGaleria{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:10px;
}

#contenedorGaleria img,
#contenedorGaleria video{
  width:100%;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<!-- ✅ LOGO (ARREGLADO) -->
<div class="banner">
  <img src="https://shaggyvision.github.io/pruebawhats/logo.png">
</div>

<!-- ✅ TABS -->
<div class="tabs">
  <div class="tab active" data-tab="contacto">Contacto</div>
  <div class="tab" data-tab="plantilla">Plantilla</div>
  <div class="tab" data-tab="lista">Contactos</div>
  <div class="tab" data-tab="plantillas">Plantillas</div>
  <div class="tab" data-tab="galeria">Galería</div>
</div>

<!-- ✅ CONTACTO -->
<div id="contacto" class="section active">
<h3>Agregar contacto</h3>

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="521XXXXXXXXXX">

<select id="marca">
<option>ADMIN</option>
<option>ADO</option>
<option>SUR</option>
<option>TRT</option>
</select>

<input type="date" id="fecha">

<div style="display:flex;justify-content:space-between;margin-top:10px;">
  <button class="save" onclick="agregarContacto()">Guardar</button>

  <button class="sheet"
    onclick="window.open('https://docs.google.com/spreadsheets/d/1nojKLQL2J4OZlrf2zxPHWuSwagHR8etSYrC7Pvrus4g/edit')">
    Google Sheets
  </button>
</div>
</div>

<!-- ✅ PLANTILLA -->
<div id="plantilla" class="section">
<h3>Crear plantilla</h3>

<select id="marcaPlantilla">
<option>ADMIN</option>
<option>ADO</option>
<option>SUR</option>
<option>TRT</option>
</select>

<textarea id="textoPlantilla">Hola {Nombre}</textarea>
<input id="urlMedia" placeholder="URL imagen/video">

<button class="save" onclick="guardarPlantilla()">Guardar</button>
</div>

<!-- ✅ CONTACTOS -->
<div id="lista" class="section">
<h3>Contactos</h3>

<table>
<thead>
<tr>
<th>Nombre</th>
<th>Teléfono</th>
<th>Área</th>
<th>Fecha</th>
<th>Acción</th>
</tr>
</thead>

<tbody id="tabla"></tbody>
</table>
</div>

<!-- ✅ PLANTILLAS -->
<div id="plantillas" class="section">
<h3>Plantillas</h3>

<table>
<thead>
<tr>
<th>Área</th>
<th>Mensaje</th>
<th>Media</th>
<th>Acción</th>
</tr>
</thead>

<tbody id="tablaPlantillas"></tbody>
</table>
</div>

<!-- ✅ GALERIA (ARREGLADA) -->
<div id="galeria" class="section">
<h3>Galería</h3>
<div id="contenedorGaleria"></div>
</div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzUX-hDUuKcj_we3d9GHsT8MCm0W0Er-nYKHqZsZigpmk1S6zWAuYMtPiFRV4uDjc0m/exec";

let contactos = [];
let plantillas = [];
let galeria = [];

//////////////////////////////////////////////////
document.addEventListener("DOMContentLoaded", function(){

  document.querySelectorAll(".tab").forEach(tab=>{
    tab.addEventListener("click", function(){

      document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
      this.classList.add("active");

      let id = this.dataset.tab;

      document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
      document.getElementById(id).classList.add("active");

    });
  });

  cargarContactos();
  cargarPlantillas();
  cargarGaleria();

});

//////////////////////////////////////////////////
async function cargarContactos(){
  let r = await fetch(SCRIPT_URL);
  contactos = await r.json();
  render();
}

async function agregarContacto(){

  let nombre = document.getElementById("nombre").value;
  let telefono = document.getElementById("telefono").value;
  let marca = document.getElementById("marca").value;
  let fecha = document.getElementById("fecha").value;

  await fetch(SCRIPT_URL,{
    method:"POST",
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({nombre,telefono,marca,fecha})
  });

  alert("Guardado");
  cargarContactos();
}

async function borrarContacto(telefono){
  await fetch(SCRIPT_URL,{
    method:"POST",
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({accion:'borrar',telefono})
  });
  cargarContactos();
}

//////////////////////////////////////////////////
async function cargarPlantillas(){
  let r = await fetch(SCRIPT_URL+"?tipo=plantillas");
  plantillas = await r.json();
  renderPlantillas();
}

async function guardarPlantilla(){
  let marca = document.getElementById("marcaPlantilla").value;
  let plantilla = document.getElementById("textoPlantilla").value;
  let archivo = document.getElementById("urlMedia").value;

  await fetch(SCRIPT_URL,{
    method:"POST",
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({
      tipoOperacion:"guardarPlantilla",
      marca,plantilla,archivoURLmanual:archivo
    })
  });

  cargarPlantillas();
}

async function borrarPlantilla(marca){
  await fetch(SCRIPT_URL,{
    method:"POST",
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({
      tipoOperacion:"borrarPlantilla",
      marca
    })
  });
  cargarPlantillas();
}

//////////////////////////////////////////////////
function render(){
  tabla.innerHTML="";
  contactos.forEach(c=>{
    tabla.innerHTML+=`
    <tr>
      <td>${c.nombre}</td>
      <td>${c.telefono}</td>
      <td>${c.marca}</td>
      <td>${c.fecha}</td>
      <td>
        <button class="delete" onclick="borrarContacto('${c.telefono}')">🗑</button>
      </td>
    </tr>`;
  });
}

function renderPlantillas(){
  tablaPlantillas.innerHTML="";
  plantillas.forEach(p=>{
    tablaPlantillas.innerHTML+=`
    <tr>
      <td>${p.marca}</td>
      <td>${p.plantilla}</td>
      <td>${p.archivo}</td>
      <td>
        <button class="delete" onclick="borrarPlantilla('${p.marca}')">🗑</button>
      </td>
    </tr>`;
  });
}

//////////////////////////////////////////////////
// ✅ GALERIA FUNCIONANDO
//////////////////////////////////////////////////
async function cargarGaleria(){
  let r = await fetch(SCRIPT_URL+"?tipo=galeria");
  galeria = await r.json();
  renderGaleria();
}

function renderGaleria(){

  let cont = document.getElementById("contenedorGaleria");
  cont.innerHTML="";

  galeria.forEach(item => {

    if(item.tipo.includes("image")){
      cont.innerHTML += `
        <img src="${item.urlelse if(item.tipo.includes("video")){
      cont.innerHTML += `
        <video src="${item.url}" controls}

  });
}

</script>

</body>
</html>
