<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Happy Moments PRO</title>

<style>
body{font-family:sans-serif;background:#f4f5fb;padding:20px;}
.container{max-width:1000px;margin:auto;background:white;padding:20px;border-radius:20px;}

.tabs{display:flex;gap:10px;margin-bottom:20px;}
.tab{
  padding:10px;
  background:#ddd;
  cursor:pointer;
  border-radius:8px;
}
.tab.active{
  background:#7e22ce;
  color:white;
}

.section{display:none;}
.section.active{display:block;}

input, textarea, select{
  width:100%;
  padding:10px;
  margin-top:10px;
}

button{
  padding:10px;
  background:#7e22ce;
  color:white;
  border:none;
  margin-top:10px;
  cursor:pointer;
  border-radius:8px;
}

table{width:100%;margin-top:20px;border-collapse:collapse;}
td,th{padding:10px;border-bottom:1px solid #ddd;}
</style>
</head>

<body>

<div class="container">

<h2>CRM Happy Moments</h2>

<!-- ✅ TABS -->
<div class="tabs">
  <div class="tab active" data-tab="contacto">Contacto</div>
  <div class="tab" data-tab="plantilla">Plantilla</div>
  <div class="tab" data-tab="lista">Contactos</div>
  <div class="tab" data-tab="plantillasLista">Plantillas</div>
</div>

<!-- ✅ AGREGAR CONTACTO -->
<div id="contacto" class="section active">
<h3>Agregar contacto</h3>

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="521XXXXXXXXXX">

<select id="marca">
<option>ADMIN</option>
<option>ADO</option>
<option>SUR</option>
<option>TRT</option>
</select>

<input type="date" id="fecha">

<button onclick="agregarContacto()">Guardar</button>
</div>

<!-- ✅ PLANTILLA -->
<div id="plantilla" class="section">
<h3>Crear plantilla</h3>

<select id="marcaPlantilla">
<option>ADMIN</option>
<option>ADO</option>
<option>SUR</option>
<option>TRT</option>
</select>

<textarea id="textoPlantilla">Hola {Nombre}</textarea>

<input id="urlMedia" placeholder="URL imagen o video">

<button onclick="guardarPlantilla()">Guardar plantilla</button>
</div>

<!-- ✅ CONTACTOS -->
<div id="lista" class="section">
<h3>Contactos</h3>
<table>
<tr><th>Nombre</th><th>Teléfono</th><th>Área</th><th>Fecha</th></tr>
<tbody id="tabla"></tbody>
</table>
</div>

<!-- ✅ PLANTILLAS -->
<div id="plantillasLista" class="section">
<h3>Plantillas</h3>
<table>
<tr><th>Área</th><th>Mensaje</th><th>Media</th></tr>
<tbody id="tablaPlantillas"></tbody>
</table>
</div>

</div>

<script>

const SCRIPT_URL='https://script.google.com/macros/s/AKfycbzUX-hDUuKcj_we3d9GHsT8MCm0W0Er-nYKHqZsZigpmk1S6zWAuYMtPiFRV4uDjc0m/exec';

let contactos=[];
let plantillas=[];

//////////////////////////////////////////////////
// ✅ TABS
//////////////////////////////////////////////////
document.addEventListener("DOMContentLoaded", function(){

document.querySelectorAll('.tab').forEach(tab => {

tab.addEventListener('click', function(){

document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
tab.classList.add('active');

document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));

let id=tab.getAttribute('data-tab');
document.getElementById(id).classList.add('active');

});

});

cargarContactos();
cargarPlantillas();

});

//////////////////////////////////////////////////
// ✅ CONTACTOS
//////////////////////////////////////////////////
async function cargarContactos(){
let res=await fetch(SCRIPT_URL);
contactos=await res.json();
render();
}

async function agregarContacto(){

let nombre=document.getElementById('nombre').value;
let telefono=document.getElementById('telefono').value;
let marca=document.getElementById('marca').value;
let fecha=document.getElementById('fecha').value;

await fetch(SCRIPT_URL,{
method:'POST',
headers:{'Content-Type':'text/plain'},
body:JSON.stringify({nombre,telefono,marca,fecha})
});

cargarContactos();
}

//////////////////////////////////////////////////
// ✅ PLANTILLAS
//////////////////////////////////////////////////
async function cargarPlantillas(){
let res=await fetch(SCRIPT_URL+'?tipo=plantillas');
plantillas=await res.json();
renderPlantillas();
}

async function guardarPlantilla(){

let marca=document.getElementById('marcaPlantilla').value;
let plantilla=document.getElementById('textoPlantilla').value;
let url=document.getElementById('urlMedia').value;

await fetch(SCRIPT_URL,{
method:'POST',
headers:{'Content-Type':'text/plain'},
body:JSON.stringify({
tipoOperacion:'guardarPlantilla',
marca:marca,
plantilla:plantilla,
archivoURLmanual:url
})
});

cargarPlantillas();
}

//////////////////////////////////////////////////
// ✅ MOSTRAR TABLAS
//////////////////////////////////////////////////
function render(){
let t=document.getElementById('tabla');
t.innerHTML='';

contactos.forEach(c=>{

t.innerHTML+=`
<tr>
<td>${c.nombre}</td>
<td>${c.telefono}</td>
<td>${c.marca}</td>
<td>${c.fecha}</td>
</tr>
`;

});
}

function renderPlantillas(){
let t=document.getElementById('tablaPlantillas');
t.innerHTML='';

plantillas.forEach(p=>{
t.innerHTML+=`
<tr>
<td>${p.marca}</td>
<td>${p.plantilla}</td>
<td>${p.archivo}</td>
</tr>
`;
});
}

</script>

</body>
</html>
