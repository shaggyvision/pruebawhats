<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Moments CRM</title>

<style>
body{
  font-family:sans-serif;
  background:#f4f5fb;
  padding:40px;
}
.container{
  max-width:1100px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:20px;
}
input, textarea, select{
  width:100%;
  padding:12px;
  margin-top:10px;
}
button{
  padding:10px;
  background:#7e22ce;
  color:white;
  border:none;
  margin-top:10px;
  cursor:pointer;
  border-radius:8px;
}
.delete{
  background:#dc2626;
}
.table-btn{
  display:flex;
  gap:5px;
}
table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}
td,th{
  padding:10px;
  border-bottom:1px solid #ddd;
}
.status{
  padding:10px;
  margin-top:10px;
  display:none;
}
.success{background:#dcfce7;}
.error{background:#fee2e2;}
</style>
</head>

<body>

<div class="container">

<h1>🎉 Happy Moments CRM</h1>

<h2>Agregar contacto</h2>

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="521XXXXXXXXXX">

<select id="marca">
  <option value="ADMIN">ADMIN</option>
  <option value="ADO">ADO</option>
  <option value="SUR">SUR</option>
  <option value="TRT">TRT</option>
</select>

<select id="tipo">
  <option value="cumpleaños">Cumpleaños</option>
  <option value="aniversario">Aniversario</option>
</select>

<input type="date" id="fecha">

<button onclick="agregarContacto()">
Guardar + Enviar WhatsApp
</button>

<div id="estado" class="status"></div>

<h2>Plantillas</h2>

<textarea id="plantilla_ADMIN">
🎉 Hola {Nombre}, hoy celebramos algo especial 🎉
</textarea>

<!-- ✅ NUEVO: SUBIR ARCHIVO -->
<input type="file" id="archivo" accept="image/*,video/*">

<button onclick="guardarPlantilla()">
Guardar plantilla con archivo
</button>

<h2>Contactos</h2>

<table>
<thead>
<tr>
<th>Nombre</th>
<th>Teléfono</th>
<th>Marca</th>
<th>Tipo</th>
<th>Fecha</th>
<th>Acción</th>
</tr>
</thead>

<tbody id="tabla"></tbody>
</table>

</div>

<script>

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzUX-hDUuKcj_we3d9GHsT8MCm0W0Er-nYKHqZsZigpmk1S6zWAuYMtPiFRV4uDjc0m/exec';

const instance = 'instance174263';
const token = 'a7hqz1tofhwq65b4';

let contactos = [];
let archivoGlobal = '';

//////////////////////////////////////////////////
function mostrarEstado(texto,tipo){
  const estado = document.getElementById('estado');
  estado.style.display='block';
  estado.className=`status ${tipo}`;
  estado.innerText=texto;

  setTimeout(()=>{
    estado.style.display='none';
  },4000);
}

//////////////////////////////////////////////////
// ✅ CARGAR CONTACTOS
//////////////////////////////////////////////////
async function cargarContactos(){
  try{
    const response = await fetch(SCRIPT_URL);
    const data = await response.json();

    if(!Array.isArray(data)){
      throw new Error('Error en datos');
    }

    contactos = data;
    render();

  }catch(error){
    console.error(error);
    mostrarEstado('Error cargando','error');
  }
}

//////////////////////////////////////////////////
// ✅ CARGAR PLANTILLAS (MULTIMEDIA)
//////////////////////////////////////////////////
async function cargarPlantillas(){
  try{
    const res = await fetch(SCRIPT_URL + '?tipo=plantillas');
    const data = await res.json();

    if(data.length > 0){
      archivoGlobal = data[0].archivo;
    }

  }catch(e){
    console.error(e);
  }
}

//////////////////////////////////////////////////
// ✅ AGREGAR CONTACTO
//////////////////////////////////////////////////
async function agregarContacto(){

  const nombre = document.getElementById('nombre').value;
  const telefono = document.getElementById('telefono').value;
  const marca = document.getElementById('marca').value;
  const tipo = document.getElementById('tipo').value;
  const fecha = document.getElementById('fecha').value;

  if(!nombre || !telefono){
    mostrarEstado('Faltan datos','error');
    return;
  }

  const mensaje = generarMensaje(nombre);

  try{

    await fetch(SCRIPT_URL,{
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({
        nombre,telefono,marca,tipo,fecha
      })
    });

    await enviarWhatsApp(telefono, mensaje, archivoGlobal);

    mostrarEstado('Guardado ✅','success');

    setTimeout(cargarContactos,1000);

  }catch(error){
    mostrarEstado('Error guardando','error');
  }
}

//////////////////////////////////////////////////
// ✅ BORRAR
//////////////////////////////////////////////////
async function borrarContacto(telefono){

  if(!confirm("¿Eliminar contacto?")) return;

  await fetch(SCRIPT_URL,{
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({
      accion:'borrar',
      telefono:telefono
    })
  });

  mostrarEstado('Eliminado ✅','success');
  setTimeout(cargarContactos,1000);
}

//////////////////////////////////////////////////
// ✅ GUARDAR PLANTILLA CON ARCHIVO
//////////////////////////////////////////////////
async function guardarPlantilla(){

  const plantilla = document.getElementById('plantilla_ADMIN').value;
  const archivoInput = document.getElementById('archivo');

  let archivoBase64 = '';
  let nombreArchivo = '';

  if(archivoInput.files.length > 0){

    const file = archivoInput.files[0];
    nombreArchivo = file.name;
    archivoBase64 = await convertirBase64(file);
  }

  await fetch(SCRIPT_URL,{
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({
      tipoOperacion:'guardarPlantilla',
      marca:'ADMIN',
      plantilla:plantilla,
      archivoBase64:archivoBase64,
      nombreArchivo:nombreArchivo
    })
  });

  mostrarEstado('Plantilla guardada ✅','success');
  cargarPlantillas();
}

//////////////////////////////////////////////////
// ✅ BASE64
//////////////////////////////////////////////////
function convertirBase64(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
  });
}

//////////////////////////////////////////////////
// ✅ WHATSAPP (CON MULTIMEDIA)
//////////////////////////////////////////////////
async function enviarWhatsApp(telefono, mensaje, mediaURL){

  try{

    if(mediaURL){

      await fetch(`https://api.ultramsg.com/${instance}/messages/image`,{
        method:'POST',
        headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body:new URLSearchParams({
          token:token,
          to:telefono,
          image:mediaURL,
          caption:mensaje
        })
      });

    }else{

      await fetch(`https://api.ultramsg.com/${instance}/messages/chat`,{
        method:'POST',
        headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body:new URLSearchParams({
          token:token,
          to:telefono,
          body:mensaje
        })
      });
    }

  }catch(error){
    console.error(error);
  }
}

//////////////////////////////////////////////////
// ✅ MENSAJE
//////////////////////////////////////////////////
function generarMensaje(nombre){
  const plantilla = document.getElementById('plantilla_ADMIN').value;
  return plantilla.replace('{Nombre}', nombre);
}

//////////////////////////////////////////////////
// ✅ ENVIAR AHORA
//////////////////////////////////////////////////
async function enviarAhora(telefono,nombre){

  const mensaje = generarMensaje(nombre);

  await enviarWhatsApp(telefono, mensaje, archivoGlobal);

  mostrarEstado('Enviado ✅','success');
}

//////////////////////////////////////////////////
// ✅ RENDER
//////////////////////////////////////////////////
function render(){

  const tabla = document.getElementById('tabla');
  tabla.innerHTML='';

  if(contactos.length === 0){
    tabla.innerHTML = `<tr><td colspan="6">Sin contactos</td></tr>`;
    return;
  }

  contactos.forEach(c=>{
    tabla.innerHTML += `
      <tr>
        <td>${c.nombre}</td>
        <td>${c.telefono}</td>
        <td>${c.marca}</td>
        <td>${c.tipo}</td>
        <td>${c.fecha}</td>

        <td>
          <div class="table-btn">
            <button onclick="enviarAhora('${c.telefono}','${c.nombre}')">📲</button>
            <button class="delete" onclick="borrarContacto('${c.telefono}')">🗑</button>
          </div>
        </td>
      </tr>
    `;
  });
}

//////////////////////////////////////////////////
// ✅ INIT
//////////////////////////////////////////////////
window.onload = function(){
  cargarContactos();
  cargarPlantillas();
  setInterval(cargarContactos,30000);
};

</script>

</body>
</html>
