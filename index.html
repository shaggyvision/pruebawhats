<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Moments CRM</title>

<style>
body{
font-family:sans-serif;
background:#f4f5fb;
padding:40px;
}
.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
}
input, select{
width:100%;
padding:10px;
margin-top:10px;
}
button{
padding:12px;
background:#7e22ce;
color:white;
border:none;
margin-top:10px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>Agregar contacto</h2>

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="521XXXXXXXXXX">
<select id="marca">
<option>ADMIN</option>
<option>ADO</option>
<option>SUR</option>
<option>TRT</option>
</select>

<button onclick="agregarContacto()">
Guardar y Enviar WhatsApp
</button>

</div>

<script>

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzUX-hDUuKcj_we3d9GHsT8MCm0W0Er-nYKHqZsZigpmk1S6zWAuYMtPiFRV4uDjc0m/exec';

// 🔴 DATOS ULTRAMSG
const instance = 'instance174263';
const token = 'a7hqz1tofhwq65b4';


// ✅ FUNCIÓN PARA ENVIAR WHATSAPP
async function enviarWhatsApp(telefono, mensaje){

    try{
        const response = await fetch(
            `https://api.ultramsg.com/${instance}/messages/chat`,
            {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: new URLSearchParams({
                    token: token,
                    to: telefono,
                    body: mensaje,
                    priority: 10
                })
            }
        );

        const data = await response.json();
        console.log("Respuesta UltraMsg:", data);

    }catch(error){
        console.error("Error enviando WhatsApp:", error);
    }
}



// ✅ GUARDAR Y ENVIAR
async function agregarContacto(){

    const nombre = document.getElementById('nombre').value;
    const telefono = document.getElementById('telefono').value;
    const marca = document.getElementById('marca').value;

    // MENSAJE PERSONALIZADO
    const mensaje = `🎉 Hola ${nombre}!
Te enviamos un saludo especial de ${marca} 🎉`;

    try{

        // Guardar en tu Google Script
        await fetch(SCRIPT_URL,{
            method:'POST',
            headers:{
                'Content-Type':'text/plain;charset=utf-8'
            },
            body:JSON.stringify({
                nombre,
                telefono,
                marca
            })
        });

        // ✅ ENVÍA WHATSAPP
        await enviarWhatsApp(telefono, mensaje);

        alert("✅ Contacto guardado y WhatsApp enviado");

    }catch(error){
        console.error(error);
        alert("❌ Error");
    }

}

</script>

</body>
</html>
