<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Happy Moments</title>

<style>
body{font-family:sans-serif;background:#f4f5fb;padding:20px;}
.container{max-width:1000px;margin:auto;background:white;padding:20px;border-radius:20px;}
.tabs{display:flex;gap:10px;margin-bottom:20px;justify-content:center;}
.tab{padding:10px;background:#ddd;border-radius:8px;cursor:pointer;}
.tab.active{background:#7e22ce;color:white;}
.section{display:none;}
.section.active{display:block;}
input,textarea,select{width:100%;margin-top:10px;padding:10px;}
button{padding:10px;border:none;border-radius:8px;color:white;cursor:pointer;}
.save{background:#7e22ce;}
.send{background:#16a34a;}
.delete{background:#dc2626;}
</style>
</head>

<body>

<div class="container">

<div class="tabs">
<div class="tab active" data-tab="contacto">Contacto</div>
<div class="tab" data-tab="plantilla">Plantilla</div>
<div class="tab" data-tab="lista">Contactos</div>
</div>

<!-- CONTACTO -->
<div id="contacto" class="section active">
<input id="nombre" placeholder="Nombre">
<input id="telefono">
<input type="date" id="fecha">

<select id="marca">
<option>ADMIN CUMPLEAÑOS</option>
<option>ADMIN ANIVERSARIO</option>
<option>ADMIN RECONOCIMIENTO</option>
<option>ADO CUMPLEAÑOS</option>
<option>ADO ANIVERSARIO</option>
<option>ADO RECONOCIMIENTO</option>
<option>SUR CUMPLEAÑOS</option>
<option>SUR ANIVERSARIO</option>
<option>SUR RECONOCIMIENTO</option>
<option>TRT CUMPLEAÑOS</option>
<option>TRT ANIVERSARIO</option>
<option>TRT RECONOCIMIENTO</option>
</select>

<button class="save" onclick="agregarContacto()">Guardar</button>
</div>

<!-- LISTA -->
<div id="lista" class="section">
<table>
<thead>
<tr>
<th>Nombre</th>
<th>Tel</th>
<th>Fecha</th>
<th>Tipo</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

</div>

<script>

const SCRIPT_URL = "TU_SCRIPT_URL";

let contactos = [];

document.querySelectorAll(".tab").forEach(tab=>{
tab.onclick=()=>{
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
tab.classList.add("active");
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(tab.dataset.tab).classList.add("active");
};
});

async function cargarContactos(){
let res = await fetch(SCRIPT_URL);
contactos = await res.json();
render();

// 🔥 VALIDACIÓN AUTOMÁTICA
revisarFechasAutomatico();
}

async function agregarContacto(){
let nombre = nombre.value;
let telefono = telefono.value;
let fecha = fecha.value;
let marca = marca.value;

await fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({nombre,telefono,fecha,marca})
});

alert("guardado");
cargarContactos();
}

function render(){
tabla.innerHTML="";
contactos.forEach(c=>{
tabla.innerHTML+=`
<tr>
<td>${c.nombre}</td>
<td>${c.telefono}</td>
<td>${c.fecha}</td>
<td>${c.marca}</td>
</tr>
`;
});
}

// ✅ FUNCIÓN AUTOMÁTICA
function revisarFechasAutomatico(){

let hoy = new Date();
let diaHoy = hoy.getDate();
let mesHoy = hoy.getMonth()+1;

contactos.forEach(c=>{

if(!c.fecha) return;

let f = new Date(c.fecha);

if(f.getDate()==diaHoy && (f.getMonth()+1)==mesHoy){

// evitar duplicados (local)
let clave = c.telefono + hoy.toDateString();

if(localStorage.getItem(clave)) return;

localStorage.setItem(clave,true);

console.log("enviando a ",c.nombre);

// AQUÍ ENVÍAS
enviarAhora(c.telefono,c.nombre,c.marca);

}

});

}

function enviarAhora(telefono,nombre,marca){
alert("🎉 Enviando a "+nombre);
}

cargarContactos();

</script>

</body>
</html>
