<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Happy Moments PRO</title>

<style>
body{font-family:sans-serif;background:#f4f5fb;padding:20px;}
.container{max-width:1100px;margin:auto;background:white;padding:20px;border-radius:20px;}

/* ✅ TABS */
.tabs{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}
.tab{
  padding:10px 15px;
  background:#ddd;
  cursor:pointer;
  border-radius:8px;
}
.tab.active{
  background:#7e22ce;
  color:white;
}

/* ✅ SECCIONES */
.section{display:none;}
.section.active{display:block;}

input, textarea, select{
  width:100%;
  padding:10px;
  margin-top:10px;
}
button{
  padding:10px;
  background:#7e22ce;
  color:white;
  border:none;
  margin-top:10px;
  cursor:pointer;
  border-radius:8px;
}
.delete{background:#dc2626;}
table{width:100%;margin-top:20px;border-collapse:collapse;}
td,th{padding:10px;border-bottom:1px solid #ddd;}
.status{padding:10px;margin-top:10px;display:none;}
.success{background:#dcfce7;}
.error{background:#fee2e2;}

#previewBox{margin-top:15px;}
</style>
</head>

<body>

<div class="container">

<h1>🎉 CRM Happy Moments PRO</h1>

<!-- ✅ PESTAÑAS -->
<div class="tabs">
  <div class="tab active" onclick="cambiarTab('contacto')">Agregar Contacto</div>
  <div class="tab" onclick="cambiarTab('plantilla')">Plantillas</div>
  <div class="tab" onclick="cambiarTab('lista')">Ver Contactos</div>
  <div class="tab" onclick="cambiarTab('plantillasLista')">Ver Plantillas</div>
</div>

<div id="estado" class="status"></div>

<!-- ================= CONTACTOS ================= -->
<div id="contacto" class="section active">

<h2>Agregar contacto</h2>

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="521XXXXXXXXXX">

<select id="marca_contacto">
<option>ADMIN</option>
<option>ADO</option>
<option>SUR</option>
<option>TRT</option>
</select>

<input type="date" id="fecha">

<button onclick="agregarContacto()">Guardar contacto</button>

</div>

<!-- ================= PLANTILLA ================= -->
<div id="plantilla" class="section">

<h2>Crear plantilla</h2>

<select id="marca_plantilla">
<option>ADMIN</option>
<option>ADO</option>
<option>SUR</option>
<option>TRT</option>
</select>

<textarea id="plantillaTexto">🎉 Hola {Nombre}, feliz día 🎉</textarea>

<input type="file" id="archivo" accept="image/*,video/*" onchange="mostrarPreviewArchivo()">
<input id="archivoURL" placeholder="URL de imagen o video" oninput="mostrarPreviewURL()">

<div id="previewBox"></div>

<button onclick="guardarPlantilla()">Guardar plantilla</button>

</div>

<!-- ================= LISTA CONTACTOS ================= -->
<div id="lista" class="section">

<h2>Contactos</h2>

<table>
<thead>
<tr>
<th>Nombre</th>
<th>Teléfono</th>
<th>Área</th>
<th>Fecha</th>
<th>Acción</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

</div>

<!-- ================= LISTA PLANTILLAS ================= -->
<div id="plantillasLista" class="section">

<h2>Plantillas guardadas</h2>

<table>
<thead>
<tr>
<th>Área</th>
<th>Mensaje</th>
<th>Media</th>
</tr>
</thead>
<tbody id="tablaPlantillas"></tbody>
</table>

</div>

</div>

<script>

const SCRIPT_URL='https://script.google.com/macros/s/AKfycbzUX-hDUuKcj_we3d9GHsT8MCm0W0Er-nYKHqZsZigpmk1S6zWAuYMtPiFRV4uDjc0m/exec';

let contactos=[];
let plantillas=[];

//////////////////////////////////////////////////
// ✅ TABS
//////////////////////////////////////////////////
function cambiarTab(id){

document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');

document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
event.target.classList.add('active');
}

//////////////////////////////////////////////////
function mostrarEstado(t,tipo){
let e=document.getElementById('estado');
e.style.display='block';
e.className=`status ${tipo}`;
e.innerText=t;
setTimeout(()=>e.style.display='none',3000);
}

//////////////////////////////////////////////////
// ✅ CARGAR
//////////////////////////////////////////////////
async function cargarContactos(){
let res=await fetch(SCRIPT_URL);
contactos=await res.json();
render();
}

async function cargarPlantillas(){
let res=await fetch(SCRIPT_URL+'?tipo=plantillas');
plantillas=await res.json();
renderPlantillas();
}

//////////////////////////////////////////////////
// ✅ CONTACTO
//////////////////////////////////////////////////
async function agregarContacto(){

let nombre=document.getElementById('nombre').value;
let telefono=document.getElementById('telefono').value;
let marca=document.getElementById('marca_contacto').value;
let fecha=document.getElementById('fecha').value;

await fetch(SCRIPT_URL,{
method:'POST',
headers:{'Content-Type':'text/plain'},
body:JSON.stringify({nombre,telefono,marca,fecha})
});

mostrarEstado('Guardado ✅','success');
cargarContactos();
}

async function borrarContacto(tel){

if(!confirm("Eliminar?")) return;

await fetch(SCRIPT_URL,{
method:'POST',
headers:{'Content-Type':'text/plain'},
body:JSON.stringify({accion:'borrar',telefono:tel})
});

cargarContactos();
}

//////////////////////////////////////////////////
// ✅ PLANTILLA
//////////////////////////////////////////////////
async function guardarPlantilla(){

let marca=document.getElementById('marca_plantilla').value;
let plantilla=document.getElementById('plantillaTexto').value;
let archivoURL=document.getElementById('archivoURL').value;

await fetch(SCRIPT_URL,{
method:'POST',
headers:{'Content-Type':'text/plain'},
body:JSON.stringify({
tipoOperacion:'guardarPlantilla',
marca,plantilla,archivoURLmanual:archivoURL
})
});

mostrarEstado('Plantilla guardada ✅','success');
cargarPlantillas();
}

// ✅ PREVIEW
//////////////////////////////////////////////////

// ✅ MENSAJE
//////////////////////////////////////////////////
function generarMensaje(n,m){
let p=plantillas.find(x=>x.marca===m);
return p ? p.plantilla.replace('{Nombre}',n) : "Hola "+n;
}

//////////////////////////////////////////////////
// ✅ WHATSAPP
//////////////////////////////////////////////////
async function enviarWhatsApp(t,m,media){

if(media){
await fetch(`https://api.ultramsg.com/${instance}/messages/image`,{
method:'POST',
headers:{'Content-Type':'application/x-www-form-urlencoded'},
body:new URLSearchParams({token,to:t,image:media,caption:m})
});
}
}

//////////////////////////////////////////////////
// ✅ TABLAS
//////////////////////////////////////////////////
function render(){

let t=document.getElementById('tabla');
t.innerHTML='';

contactos.forEach(c=>{
t.innerHTML+=`
<tr>
<td>${c.nombre}</td>
<td>${c.telefono}</td>
<td>${c.marca}</td>
<td>${c.fecha}</td>
<td>
<button onclick="borrarContacto('${c.telefono}')">🗑</button>
</td>
</tr>`;
});
}

function renderPlantillas(){

let t=document.getElementById('tablaPlantillas');
t.innerHTML='';

plantillas.forEach(p=>{
t.innerHTML+=`
<tr>
<td>${p.marca}</td>
<td>${p.plantilla}</td>
<td>${p.archivo ? '✅' : '❌'}</td>
</tr>`;
});
}

//////////////////////////////////////////////////
window.onload=()=>{
cargarContactos();
cargarPlantillas();
};

</script>

</body>
</html>
