<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Happy Moments CRM</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:'Poppins',sans-serif;
background:#f4f5fb;
margin:0;
padding:40px;
}

.container{
max-width:1200px;
margin:auto;
background:white;
padding:30px;
border-radius:24px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
color:#7e22ce;
}

.card{
background:#faf7ff;
padding:20px;
border-radius:20px;
margin-top:20px;
}

input,textarea,select{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #ddd;
margin-top:10px;
margin-bottom:15px;
}

button{
padding:14px 20px;
border:none;
background:#7e22ce;
color:white;
border-radius:14px;
cursor:pointer;
font-weight:600;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
padding:14px;
border-bottom:1px solid #eee;
text-align:left;
}
</style>
</head>

<body>

<div class="container">

<h1>🎉 Happy Moments CRM</h1>

<div class="card">
<h2>Agregar contacto</h2>

<input type="text" id="nombre" placeholder="Nombre">
<input type="text" id="telefono" placeholder="WhatsApp">

<select id="tipo">
<option value="cumpleaños">Cumpleaños</option>
<option value="aniversario">Aniversario</option>
</select>

<input type="date" id="fecha">

<button onclick="agregar()">Agregar contacto</button>
</div>

<div class="card">
<h2>Plantilla automática</h2>

<textarea id="mensaje">🎉 Hola {nombre}, Happy Moments y Mobility ADO te desean un excelente día.</textarea>

<button onclick="guardarPlantilla()">Guardar plantilla</button>
</div>

<div class="card">
<h2>Contactos</h2>

<table>
<thead>
<tr>
<th>Nombre</th>
<th>WhatsApp</th>
<th>Evento</th>
<th>Fecha</th>
</tr>
</thead>

<tbody id="tabla"></tbody>
</table>
</div>

</div>

<script>

let contactos = JSON.parse(localStorage.getItem('contactos')) || [];

function agregar(){

const nombre = document.getElementById('nombre').value;
const telefono = document.getElementById('telefono').value;
const tipo = document.getElementById('tipo').value;
const fecha = document.getElementById('fecha').value;

if(!nombre || !telefono || !fecha){
alert('Completa todos los campos');
return;
}

contactos.push({
nombre,
telefono,
tipo,
fecha
});

localStorage.setItem('contactos',JSON.stringify(contactos));

render();

alert('Contacto agregado');
}

function render(){

const tabla = document.getElementById('tabla');

tabla.innerHTML='';

contactos.forEach(c=>{

tabla.innerHTML += `
<tr>
<td>${c.nombre}</td>
<td>${c.telefono}</td>
<td>${c.tipo}</td>
<td>${c.fecha}</td>
</tr>
`;

});

}

function guardarPlantilla(){

const mensaje = document.getElementById('mensaje').value;

localStorage.setItem('plantilla',mensaje);

alert('Plantilla guardada');

}

render();

</script>

</body>
</html>
