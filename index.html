<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Happy Moments</title>

<style>
body{font-family:sans-serif;background:#f4f5fb;padding:20px;}
.container{max-width:1000px;margin:auto;background:white;padding:20px;border-radius:20px;}
.banner img{width:100%;height:160px;object-fit:contain;border-radius:12px;}
.tabs{display:flex;gap:10px;margin-bottom:20px;justify-content:center;}
.tab{padding:10px 15px;background:#ddd;cursor:pointer;border-radius:8px;}
.tab.active{background:#7e22ce;color:white;}
.section{display:none;}
.section.active{display:block;}
input, textarea, select{width:100%;padding:10px;margin-top:10px;}
button{padding:10px;border:none;cursor:pointer;border-radius:8px;color:white;display:flex;align-items:center;gap:6px;}
.save{background:#7e22ce;}
.send{background:#16a34a;}
.delete{background:#dc2626;}
.sheet{background:#15803d;}
table{width:100%;margin-top:20px;border-collapse:collapse;}
td,th{padding:10px;border-bottom:1px solid #ddd;}
</style>

</head>
<body>

<div class="container">

<div class="banner">
<img src="https://shaggyvision.github.io/pruebawhats/logo.png">
</div>

<div class="tabs">
<div class="tab active" data-tab="contacto">Registro</div>
<div class="tab" data-tab="plantilla">Plantilla</div>
<div class="tab" data-tab="lista">Contactos</div>
<div class="tab" data-tab="plantillas">Plantillas</div>
</div>

<!-- CONTACTO -->
<div id="contacto" class="section active">
<h3>Agregar contacto</h3>
<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="521XXXXXXXXXX">

<select id="marca">
<option>ADMIN CUMPLEAÑOS</option>
<option>ADMIN ANIVERSARIO</option>
<option>ADMIN RECONOCIMIENTO</option>
<option>ADO CUMPLEAÑOS</option>
<option>ADO ANIVERSARIO</option>
<option>ADO RECONOCIMIENTO</option>
<option>SUR CUMPLEAÑOS</option>
<option>SUR ANIVERSARIO</option>
<option>SUR RECONOCIMIENTO</option>
<option>TRT CUMPLEAÑOS</option>
<option>TRT ANIVERSARIO</option>
<option>TRT RECONOCIMIENTO</option>
</select>

<input type="date" id="fecha">

<div style="display:flex;justify-content:space-between;margin-top:10px;">
<button class="save" onclick="agregarContacto()">✅ Guardar</button>

<button class="sheet" onclick="window.open('https://docs.google.com/spreadsheets/d/1nojKLQL2J4OZlrf2zxPHWuSwagHR8etSYrC7Pvrus4g/edit')">
📊 BD-CONTACTOS
</button>
</div>
</div>

<!-- PLANTILLA -->
<div id="plantilla" class="section">
<h3>Crear plantilla</h3>

<button class="save" style="margin-bottom:10px;"
onclick="window.open('https://console.cloudinary.com/app/c-5bc2ef093db7a7aebd17f5a6b23dfb/assets/media_library/folders/home?view_mode=mosaic')">
🎦 Abrir Galeria 🎦
</button>

<select id="marcaPlantilla">
<option>ADMIN CUMPLEAÑOS</option>
<option>ADMIN ANIVERSARIO</option>
<option>ADMIN RECONOCIMIENTO</option>
<option>ADO CUMPLEAÑOS</option>
<option>ADO ANIVERSARIO</option>
<option>ADO RECONOCIMIENTO</option>
<option>SUR CUMPLEAÑOS</option>
<option>SUR ANIVERSARIO</option>
<option>SUR RECONOCIMIENTO</option>
<option>TRT CUMPLEAÑOS</option>
<option>TRT ANIVERSARIO</option>
<option>TRT RECONOCIMIENTO</option>
</select>

<textarea id="textoPlantilla">Hola {Nombre}</textarea>
<input id="urlMedia" placeholder="URL imagen/video">

<button class="save" style="margin-top:10px;" onclick="guardarPlantilla()">
💾 Guardar plantilla
</button>
</div>

<!-- CONTACTOS -->
<div id="lista" class="section">
<h3>Contactos</h3>

<table>
<thead>
<tr>
<th>Nombre</th>
<th>Teléfono</th>
<th>Área</th>
<th>Fecha</th>
<th>Estado</th>
<th>Acción</th>
</tr>
</thead>

<tbody id="tabla"></tbody>
</table>
</div>

<!-- PLANTILLAS -->
<div id="plantillas" class="section">
<h3>Plantillas</h3>

<table>
<thead>
<tr>
<th>Área</th>
<th>Mensaje</th>
<th>Media</th>
<th>Acción</th>
</tr>
</thead>

<tbody id="tablaPlantillas"></tbody>
</table>
</div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzUX-hDUuKcj_we3d9GHsT8MCm0W0Er-nYKHqZsZigpmk1S6zWAuYMtPiFRV4uDjc0m/exec";

let contactos = [];
let plantillas = [];

document.addEventListener("DOMContentLoaded", async function(){

    document.querySelectorAll(".tab").forEach(tab =>{
        tab.addEventListener("click", function(){
            document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
            this.classList.add("active");
            let id = this.dataset.tab;
            document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
            document.getElementById(id).classList.add("active");
        });
    });

    await cargarPlantillas();
    await cargarContactos();

    // 🔒 YA NO ENVÍA DESDE EL NAVEGADOR
    // revisarFechasAutomatico();

});

async function cargarContactos(){
    let res = await fetch(SCRIPT_URL);
    contactos = await res.json();
    render();
}

async function agregarContacto(){
    let nombre = document.getElementById("nombre").value;
    let telefono = document.getElementById("telefono").value;
    let marca = document.getElementById("marca").value;
    let fecha = document.getElementById("fecha").value;

    await fetch(SCRIPT_URL,{
        method:"POST",
        headers:{'Content-Type':'text/plain'},
        body:JSON.stringify({nombre,telefono,marca,fecha})
    });

    alert("✅ Guardado");
    cargarContactos();
}

async function borrarContacto(telefono){
    if(!confirm("¿Eliminar contacto?")) return;

    await fetch(SCRIPT_URL,{
        method:"POST",
        headers:{'Content-Type':'text/plain'},
        body:JSON.stringify({accion:"borrar",telefono})
    });

    cargarContactos();
}

async function cargarPlantillas(){
    let res = await fetch(SCRIPT_URL + "?tipo=plantillas");
    plantillas = await res.json();
    renderPlantillas();
}

async function guardarPlantilla(){
    let marca = document.getElementById("marcaPlantilla").value;
    let plantilla = document.getElementById("textoPlantilla").value;
    let archivo = document.getElementById("urlMedia").value;

    await fetch(SCRIPT_URL,{
        method:"POST",
        headers:{'Content-Type':'text/plain'},
        body:JSON.stringify({
            tipoOperacion:"guardarPlantilla",
            marca,
            plantilla,
            archivoURLmanual:archivo
        })
    });

    alert("✅ Plantilla guardada");
    cargarPlantillas();
}

function render(){
    let t = document.getElementById("tabla");
    t.innerHTML = "";

    contactos.forEach(c=>{

        let estadoColor = c.estado === "ENVIADO" ? "green" : "gray";

        t.innerHTML += `
<tr>
<td>${c.nombre}</td>
<td>${c.telefono}</td>
<td>${c.marca}</td>
<td>${c.fecha}</td>
<td style="color:${estadoColor};font-weight:bold;">
${c.estado || "PENDIENTE"}
</td>
<td>
<button class="send"
data-tel="${c.telefono}"
data-nombre="${c.nombre}"
data-marca="${c.marca}"
onclick="enviarDesdeBoton(this)">📲</button>

<button class="delete" onclick="borrarContacto('${c.telefono}')">🗑</button>
</td>
</tr>`;
    });
}

function renderPlantillas(){
    let t = document.getElementById("tablaPlantillas");
    t.innerHTML = "";

    plantillas.forEach(p=>{
        t.innerHTML += `
<tr>
<td>${p.marca}</td>
<td>${p.plantilla}</td>
<td>${p.archivo || ''}</td>
<td>
<button class="delete" onclick="borrarPlantilla('${p.marca}')">🗑</button>
</td>
</tr>`;
    });
}

function borrarPlantilla(marca){
    if(!confirm("¿Eliminar plantilla de " + marca + "?")) return;

    fetch(SCRIPT_URL,{
        method:"POST",
        headers:{'Content-Type':'text/plain'},
        body:JSON.stringify({tipoOperacion:"borrarPlantilla",marca})
    }).then(()=>cargarPlantillas());
}

function enviarDesdeBoton(btn){
    let telefono = btn.dataset.tel.replace(/\D/g,'');
    let nombre = btn.dataset.nombre;
    let marca = btn.dataset.marca;

    enviarAhora(telefono,nombre,marca);
}

function tipoMedia(url){
    if(/\.(jpg|jpeg|png|webp)$/i.test(url)) return "imagen";
    if(/\.(mp4|mov|avi)$/i.test(url)) return "video";
    return "ninguno";
}

function enviarAhora(telefono,nombre,marca){

    let plantilla = plantillas.find(p =>
        p.marca.trim().toUpperCase() === marca.trim().toUpperCase()
    );

    let mensaje = plantilla
        ? plantilla.plantilla.replace("{Nombre}",nombre)
        : "Hola " + nombre;

    let media = plantilla ? plantilla.archivo : "";
    let tipo = tipoMedia(media);

    if(tipo === "imagen"){
        window.open(`https://api.ultramsg.com/instance174263/messages/image?token=a7hqz1tofhwq65b4&to=${telefono}&image=${encodeURIComponent(media)}&caption=${encodeURIComponent(mensaje)}`);
    } else {
        window.open(`https://api.ultramsg.com/instance174263/messages/chat?token=a7hqz1tofhwq65b4&to=${telefono}&body=${encodeURIComponent(mensaje)}`);
    }
}

</script>

</body>
</html>
