<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Happy Moments</title>

<style>
body{font-family:sans-serif;background:#f4f5fb;padding:20px;}
.container{max-width:1000px;margin:auto;background:white;padding:20px;border-radius:20px;}

.banner img{
  width:100%;
  height:160px;
  object-fit:contain;
  border-radius:12px;
}

.tabs{display:flex;gap:10px;margin-bottom:20px;justify-content:center;}
.tab{
  padding:10px 15px;
  background:#ddd;
  cursor:pointer;
  border-radius:8px;
}
.tab.active{
  background:#7e22ce;
  color:white;
}

.section{display:none;}
.section.active{display:block;}

table{width:100%;margin-top:20px;border-collapse:collapse;}
td,th{padding:10px;border-bottom:1px solid #ddd;}

#contenedorGaleria{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:10px;
}

#contenedorGaleria img,
#contenedorGaleria video{
  width:100%;
  border-radius:10px;
}
</style>
</head>

<body>
<div class="container">

<!-- ✅ LOGO (ARREGLADO) -->
<div class="banner">
  https://shaggyvision.github.io/pruebawhats/logo.png
</div>

<!-- ✅ TABS -->
<div class="tabs">
  <div class="tab active" data-tab="contacto">Contacto</div>
  <div class="tab" data-tab="lista">Contactos</div>
  <div class="tab" data-tab="galeria">Galería</div>
</div>

<!-- ✅ CONTACTO -->
<div id="contacto" class="section active">
<h3>Contacto funcional ✅</h3>
</div>

<!-- ✅ CONTACTOS -->
<div id="lista" class="section">
<h3>Contactos</h3>
<table>
<tbody id="tabla"></tbody>
</table>
</div>

<!-- ✅ GALERIA -->
<div id="galeria" class="section">
<h3>Galería</h3>
<div id="contenedorGaleria"></div>
</div>

</div>

<script>

const URL="https://script.google.com/macros/s/AKfycbzUX-hDUuKcj_we3d9GHsT8MCm0W0Er-nYKHqZsZigpmk1S6zWAuYMtPiFRV4uDjc0m/exec";

//////////////////////////////////////////////////
// ✅ PESTAÑAS (AISLADAS Y SEGURAS)
//////////////////////////////////////////////////
document.addEventListener("DOMContentLoaded", function(){

  document.querySelectorAll(".tab").forEach(tab=>{
    tab.addEventListener("click", function(){

      document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
      tab.classList.add("active");

      document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
      document.getElementById(tab.dataset.tab).classList.add("active");

    });
  });

  cargarContactos();
  cargarGaleria();

});

//////////////////////////////////////////////////
// ✅ CONTACTOS (NO ROMPEN EL SISTEMA)
//////////////////////////////////////////////////
async function cargarContactos(){
  try{
    let r=await fetch(URL);
    let data=await r.json();

    let tabla=document.getElementById("tabla");
    tabla.innerHTML="";

    data.forEach(c=>{
      tabla.innerHTML+=`<tr><td>${c.nombre}</td></tr>`;
    });

  }catch(e){
    console.log("Error contactos");
  }
}

//////////////////////////////////////////////////
// ✅ GALERIA SEGURA (NO ROMPE TABS)
//////////////////////////////////////////////////
async function cargarGaleria(){

  try{
    let r=await fetch(URL+"?tipo=galeria");
    let data=await r.json();

    let cont=document.getElementById("contenedorGaleria");
    cont.innerHTML="";

    data.forEach(item=>{

      if(item.tipo.includes("image")){
        cont.innerHTML+=`<img src="${item.url}

      else if(item.tipo.includes("video")){
        cont.innerHTML+=`<video src="${item.url}" controls  });

  }catch(e){
    console.log("Galería no disponible");
  }

}

</script>
</body>
</html>
