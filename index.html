<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Happy Moments</title>

<style>
body{font-family:sans-serif;background:#f4f5fb;padding:20px;}
.container{max-width:1000px;margin:auto;background:white;padding:20px;border-radius:20px;}

.banner img{
 width:100%;
 height:160px;
 object-fit:contain;
 border-radius:12px;
}

.tabs{display:flex;gap:10px;margin-bottom:20px;justify-content:center;}
.tab{padding:10px 15px;background:#ddd;cursor:pointer;border-radius:8px;}
.tab.active{background:#7e22ce;color:white;}

.section{display:none;}
.section.active{display:block;}

input, textarea, select{width:100%;padding:10px;margin-top:10px;}

button{padding:10px;border:none;border-radius:8px;color:white;cursor:pointer;}
.save{background:#7e22ce;}
.send{background:#16a34a;}

.galeria-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:10px;
margin-top:15px;
}

img, video{
width:100%;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<!-- ✅ BANNER CORREGIDO -->
<div class="banner">
  <img src="https://shaggyvision.github.io/pruebawhats/logo.png">
</div>

<!-- ✅ TABS -->
<div class="tabs">
<div class="tab active" data-tab="contacto">Contacto</div>
<div class="tab" data-tab="plantilla">Plantilla</div>
<div class="tab" data-tab="lista">Contactos</div>
<div class="tab" data-tab="plantillas">Plantillas</div>
<div class="tab" data-tab="galeria">Galería</div>
</div>

<!-- CONTACTO -->
<div id="contacto" class="section active">
<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="521XXXXXXXXXX">
<select id="marca">
<option>ADMIN</option>
<option>ADO</option>
<option>SUR</option>
<option>TRT</option>
</select>
<input type="date" id="fecha">
<button onclick="agregarContacto()" class="save">Guardar</button>
</div>

<!-- PLANTILLA -->
<div id="plantilla" class="section">
<select id="marcaPlantilla">
<option>ADMIN</option>
<option>ADO</option>
<option>SUR</option>
<option>TRT</option>
</select>
<textarea id="textoPlantilla">Hola {Nombre}</textarea>
<input id="urlMedia" placeholder="URL imagen/video">
<button onclick="guardarPlantilla()" class="save">Guardar plantilla</button>
</div>

<!-- CONTACTOS -->
<div id="lista" class="section">
<table>
<tbody id="tabla"></tbody>
</table>
</div>

<!-- PLANTILLAS -->
<div id="plantillas" class="section">
<table>
<tbody id="tablaPlantillas"></tbody>
</table>
</div>

<!-- ✅ GALERÍA -->
<div id="galeria" class="section">
<h3>Galería</h3>

<input type="file" id="fileInput">
<button onclick="subirArchivo()" class="save">⬆ Subir</button>
<button onclick="cargarGaleria()" class="send">🔄 Actualizar</button>

<div id="contenedorGaleria" class="galeria-grid"></div>
</div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzUX-hDUuKcj_we3d9GHsT8MCm0W0Er-nYKHqZsZigpmk1S6zWAuYMtPiFRV4uDjc0m/exec";

const CLOUD_NAME = "dz9ipng1f";
const UPLOAD_PRESET = "crm_publico";

let galeria = [];

//////////////////////////////////////////////////
// ✅ ESPERAR DOM CORRECTAMENTE
//////////////////////////////////////////////////
window.onload = function(){

  document.querySelectorAll(".tab").forEach(tab=>{
    tab.addEventListener("click", function(){

      document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
      this.classList.add("active");

      document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
      document.getElementById(this.dataset.tab).classList.add("active");

    });
  });

}

//////////////////////////////////////////////////
// ✅ SUBIR A CLOUDINARY
//////////////////////////////////////////////////
async function subirArchivo(){

let file = document.getElementById("fileInput").files[0];
if(!file){ alert("Selecciona archivo"); return; }

let formData = new FormData();
formData.append("file", file);
formData.append("upload_preset", UPLOAD_PRESET);

let res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`,{
method:"POST",
body:formData
});

let data = await res.json();

let tipo = file.type.includes("video") ? "video" : "imagen";

await fetch(SCRIPT_URL,{
method:"POST",
headers:{'Content-Type':'text/plain'},
body:JSON.stringify({
tipoOperacion:"guardarGaleria",
nombre:file.name,
tipo:tipo,
url:data.secure_url
})
});

alert("✅ Subido correctamente");
cargarGaleria();
}

//////////////////////////////////////////////////
// ✅ GALERÍA
//////////////////////////////////////////////////

//////////////////////////////////////////////////
// ✅ GUARDAR PLANTILLA
//////////////////////////////////////////////////

</script>

</body>
</html>
