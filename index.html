<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Moments CRM PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#f4f5fb;
margin:0;
padding:40px;
}

.container{
max-width:1300px;
margin:auto;
background:white;
padding:30px;
border-radius:24px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
color:#7e22ce;
}

.card{
background:#faf7ff;
padding:20px;
border-radius:20px;
margin-top:20px;
}

input,textarea,select{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #ddd;
margin-top:10px;
margin-bottom:15px;
font-family:'Poppins',sans-serif;
box-sizing:border-box;
}

button{
padding:12px 18px;
border:none;
background:#7e22ce;
color:white;
border-radius:12px;
cursor:pointer;
font-weight:600;
margin-right:10px;
}

button:hover{
opacity:.9;
}

.btn-danger{
background:#dc2626;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
padding:14px;
border-bottom:1px solid #eee;
text-align:left;
}

.badge{
display:inline-block;
padding:6px 12px;
border-radius:20px;
font-size:12px;
background:#ede9fe;
color:#6d28d9;
font-weight:600;
}

</style>
</head>

<body>

<div class="container">

<h1>🎉 Happy Moments CRM PRO</h1>

<div class="card">
<h2>UltraMSG conectado automáticamente</h2>
<p>Instancia configurada: <b>instance174263</b></p>
<span class="badge">Mensajes automáticos inteligentes</span>
</div>

<div class="card">

<h2>Agregar contacto</h2>

<input type="text" id="nombre" placeholder="Nombre">

<input type="text" id="telefono" placeholder="WhatsApp 521XXXXXXXXXX">

<select id="tipo">

<option value="CUMPLEAÑOS TRT">CUMPLEAÑOS TRT</option>
<option value="CUMPLEAÑOS SUR">CUMPLEAÑOS SUR</option>
<option value="CUMPLEAÑOS ADMIN">CUMPLEAÑOS ADMIN</option>
<option value="CUMPLEAÑOS ADO">CUMPLEAÑOS ADO</option>

<option value="ANIVERSARIO TRT">ANIVERSARIO TRT</option>
<option value="ANIVERSARIO SUR">ANIVERSARIO SUR</option>
<option value="ANIVERSARIO ADMIN">ANIVERSARIO ADMIN</option>
<option value="ANIVERSARIO ADO">ANIVERSARIO ADO</option>

</select>

<input type="date" id="fecha">

<button onclick="agregar()">Agregar contacto</button>

</div>

<div class="card">

<h2>Crear plantilla</h2>

<select id="plantillaTipo">

<option value="CUMPLEAÑOS TRT">CUMPLEAÑOS TRT</option>
<option value="CUMPLEAÑOS SUR">CUMPLEAÑOS SUR</option>
<option value="CUMPLEAÑOS ADMIN">CUMPLEAÑOS ADMIN</option>
<option value="CUMPLEAÑOS ADO">CUMPLEAÑOS ADO</option>

<option value="ANIVERSARIO TRT">ANIVERSARIO TRT</option>
<option value="ANIVERSARIO SUR">ANIVERSARIO SUR</option>
<option value="ANIVERSARIO ADMIN">ANIVERSARIO ADMIN</option>
<option value="ANIVERSARIO ADO">ANIVERSARIO ADO</option>

</select>

<textarea id="mensaje" rows="5">🎉 Hola {nombre}, Happy Moments te desea un excelente día.</textarea>

<input type="text" id="imagen" placeholder="URL de imagen https://...">

<button onclick="guardarPlantilla()">Guardar plantilla</button>

</div>

<div class="card">

<h2>Plantillas guardadas</h2>

<table>

<thead>
<tr>
<th>Tipo</th>
<th>Mensaje</th>
<th>Imagen</th>
</tr>
</thead>

<tbody id="tablaPlantillas"></tbody>

</table>

</div>

<div class="card">

<h2>Contactos registrados</h2>

<table>

<thead>
<tr>
<th>Nombre</th>
<th>WhatsApp</th>
<th>Evento</th>
<th>Fecha</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

</div>

</div>

<script>

const instance = 'instance174263';
const token = 'a7hqz1tofhwq65b4';

let contactos = JSON.parse(localStorage.getItem('contactos')) || [];

let plantillas = JSON.parse(localStorage.getItem('plantillas')) || {};

async function enviarWhatsApp(numero,mensaje,imagen=''){

try{

let endpoint = 'messages/chat';

let bodyData = {
token:token,
to:numero,
body:mensaje
};

if(imagen && imagen.trim() !== ''){

endpoint = 'messages/image';

bodyData = {
token:token,
to:numero,
image:imagen,
caption:mensaje
};

}

const response = await fetch(`https://api.ultramsg.com/${instance}/${endpoint}`,{
method:'POST',
headers:{
'Content-Type':'application/x-www-form-urlencoded'
},
body:new URLSearchParams(bodyData)
});

const data = await response.json();

console.log(data);

}catch(error){

console.log(error);

}

}

function agregar(){

const nombre = document.getElementById('nombre').value;
const telefono = document.getElementById('telefono').value;
const tipo = document.getElementById('tipo').value;
const fecha = document.getElementById('fecha').value;

if(!nombre || !telefono || !fecha){

alert('Completa todos los campos');
return;

}

contactos.push({
nombre,
telefono,
tipo,
fecha
});

localStorage.setItem('contactos',JSON.stringify(contactos));

render();

document.getElementById('nombre').value='';
document.getElementById('telefono').value='';
document.getElementById('fecha').value='';

alert('Contacto agregado correctamente');

}

function eliminarContacto(index){

if(confirm('¿Eliminar contacto?')){

contactos.splice(index,1);

localStorage.setItem('contactos',JSON.stringify(contactos));

render();

}

}

function render(){

const tabla = document.getElementById('tabla');

tabla.innerHTML='';

contactos.forEach((c,index)=>{

tabla.innerHTML += `
<tr>
<td>${c.nombre}</td>
<td>${c.telefono}</td>
<td>${c.tipo}</td>
<td>${c.fecha}</td>
<td>
<button class="btn-danger" onclick="eliminarContacto(${index})">Eliminar</button>
</td>
</tr>
`;

});

renderPlantillas();

}

function guardarPlantilla(){

const tipo = document.getElementById('plantillaTipo').value;
const mensaje = document.getElementById('mensaje').value;
const imagen = document.getElementById('imagen').value;

plantillas[tipo] = {
mensaje,
imagen
};

localStorage.setItem('plantillas',JSON.stringify(plantillas));

renderPlantillas();

alert('Plantilla guardada');

}

function renderPlantillas(){

const tabla = document.getElementById('tablaPlantillas');

tabla.innerHTML='';

Object.keys(plantillas).forEach(tipo=>{

tabla.innerHTML += `
<tr>
<td>${tipo}</td>
<td>${plantillas[tipo].mensaje}</td>
<td>${plantillas[tipo].imagen || 'Sin imagen'}</td>
</tr>
`;

});

}

async function verificarEventos(){

const hoy = new Date();

const anio = hoy.getFullYear();
const mes = String(hoy.getMonth()+1).padStart(2,'0');
const dia = String(hoy.getDate()).padStart(2,'0');

const hoyCompleto = `${anio}-${mes}-${dia}`;
const hoyFormato = `${mes}-${dia}`;

let enviados = JSON.parse(localStorage.getItem('enviados')) || {};

for(const contacto of contactos){

const fecha = contacto.fecha.substring(5);

const clave = `${contacto.telefono}_${hoyCompleto}`;

if(fecha === hoyFormato && !enviados[clave]){

const plantilla = plantillas[contacto.tipo];

if(plantilla){

const mensaje = plantilla.mensaje.replace('{nombre}',contacto.nombre);

await enviarWhatsApp(
contacto.telefono,
mensaje,
plantilla.imagen
);

console.log('Mensaje enviado a:', contacto.nombre);

enviados[clave] = true;

localStorage.setItem('enviados', JSON.stringify(enviados));

}

}

}

}

verificarEventos();

setInterval(verificarEventos,3600000);

render();

</script>

</body>
</html>
