<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Moments CRM</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#f4f5fb;
margin:0;
padding:40px;
}

.container{
max-width:1300px;
margin:auto;
background:white;
padding:30px;
border-radius:24px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
color:#7e22ce;
}

.card{
background:#faf7ff;
padding:20px;
border-radius:20px;
margin-top:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.marca-box{
background:white;
padding:16px;
border-radius:18px;
border:1px solid #eee;
}

input,textarea,select{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #ddd;
margin-top:10px;
margin-bottom:15px;
font-size:15px;
box-sizing:border-box;
}

button{
padding:14px 20px;
border:none;
background:#7e22ce;
color:white;
border-radius:14px;
cursor:pointer;
font-weight:600;
}

button:hover{
opacity:.95;
}

.btn-delete{
background:#ef4444;
padding:10px 14px;
font-size:13px;
}

.preview{
width:100%;
max-height:220px;
object-fit:cover;
border-radius:14px;
margin-top:10px;
display:none;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
padding:14px;
border-bottom:1px solid #eee;
text-align:left;
font-size:14px;
}

.status{
padding:12px;
border-radius:12px;
margin-top:15px;
display:none;
font-weight:500;
}

.success{
background:#dcfce7;
color:#166534;
}

.error{
background:#fee2e2;
color:#991b1b;
}

@media(max-width:768px){

body{
padding:15px;
}

table{
display:block;
overflow-x:auto;
}

}

</style>
</head>

<body>

<div class="container">

<h1>🎉 Happy Moments CRM</h1>

<div class="card">
<h2>UltraMSG conectado</h2>
<p><b>Instancia:</b> instance174263</p>
</div>

<div class="card">

<h2>Agregar contacto</h2>

<input type="text" id="nombre" placeholder="Nombre">

<input type="text" id="telefono" placeholder="WhatsApp 521XXXXXXXXXX">

<select id="marca">
<option value="ADMIN">ADMIN</option>
<option value="ADO">ADO</option>
<option value="SUR">SUR</option>
<option value="TRT">TRT</option>
</select>

<select id="tipo">
<option value="cumpleaños">Cumpleaños</option>
<option value="aniversario">Aniversario</option>
</select>

<input type="date" id="fecha">

<button onclick="agregar()">Agregar contacto</button>

<div id="estado" class="status"></div>

</div>

<div class="card">

<h2>Plantillas por marca</h2>

<div class="grid">

<div class="marca-box">

<h3>ADMIN</h3>

<textarea id="plantilla_ADMIN">🎉 Hola {nombre}, ADMIN te desea un excelente día.</textarea>

<input type="text" id="video_ADMIN" placeholder="URL VIDEO MP4">

<input type="text" id="imagen_ADMIN" placeholder="URL IMAGEN">

<img id="preview_img_ADMIN" class="preview">

<video id="preview_video_ADMIN" class="preview" controls></video>

</div>

<div class="marca-box">

<h3>ADO</h3>

<textarea id="plantilla_ADO">🎉 Hola {nombre}, ADO te desea un excelente día.</textarea>

<input type="text" id="video_ADO" placeholder="URL VIDEO MP4">

<input type="text" id="imagen_ADO" placeholder="URL IMAGEN">

<img id="preview_img_ADO" class="preview">

<video id="preview_video_ADO" class="preview" controls></video>

</div>

<div class="marca-box">

<h3>SUR</h3>

<textarea id="plantilla_SUR">🎉 Hola {nombre}, SUR te desea un excelente día.</textarea>

<input type="text" id="video_SUR" placeholder="URL VIDEO MP4">

<input type="text" id="imagen_SUR" placeholder="URL IMAGEN">

<img id="preview_img_SUR" class="preview">

<video id="preview_video_SUR" class="preview" controls></video>

</div>

<div class="marca-box">

<h3>TRT</h3>

<textarea id="plantilla_TRT">🎉 Hola {nombre}, TRT te desea un excelente día.</textarea>

<input type="text" id="video_TRT" placeholder="URL VIDEO MP4">

<input type="text" id="imagen_TRT" placeholder="URL IMAGEN">

<img id="preview_img_TRT" class="preview">

<video id="preview_video_TRT" class="preview" controls></video>

</div>

</div>

<button onclick="guardarPlantillas()">
Guardar plantillas
</button>

</div>

<div class="card">

<h2>Contactos</h2>

<table>

<thead>

<tr>
<th>Nombre</th>
<th>WhatsApp</th>
<th>Marca</th>
<th>Evento</th>
<th>Fecha</th>
<th>Acción</th>
</tr>

</thead>

<tbody id="tabla"></tbody>

</table>

</div>

</div>

<script>

const instance = 'instance174263';
const token = 'a7hqz1tofhwq65b4';

let contactos = JSON.parse(localStorage.getItem('contactos')) || [];

const estado = document.getElementById('estado');

function mostrarEstado(texto,tipo){

estado.style.display='block';

estado.className=`status ${tipo}`;

estado.innerText=texto;

setTimeout(()=>{
estado.style.display='none';
},4000);

}

['ADMIN','ADO','SUR','TRT'].forEach(marca=>{

document.getElementById(`plantilla_${marca}`).value =
localStorage.getItem(`plantilla_${marca}`) ||
document.getElementById(`plantilla_${marca}`).value;

document.getElementById(`video_${marca}`).value =
localStorage.getItem(`video_${marca}`) || '';

document.getElementById(`imagen_${marca}`).value =
localStorage.getItem(`imagen_${marca}`) || '';

const video = document.getElementById(`video_${marca}`).value;

const imagen = document.getElementById(`imagen_${marca}`).value;

if(video){

const videoPreview =
document.getElementById(`preview_video_${marca}`);

videoPreview.src = video;
videoPreview.style.display='block';

}

if(imagen){

const imgPreview =
document.getElementById(`preview_img_${marca}`);

imgPreview.src = imagen;
imgPreview.style.display='block';

}

document.getElementById(`video_${marca}`)
.addEventListener('input',function(){

const preview =
document.getElementById(`preview_video_${marca}`);

preview.src = this.value;

if(this.value){

preview.style.display='block';

}else{

preview.style.display='none';

}

});

document.getElementById(`imagen_${marca}`)
.addEventListener('input',function(){

const preview =
document.getElementById(`preview_img_${marca}`);

preview.src = this.value;

if(this.value){

preview.style.display='block';

}else{

preview.style.display='none';

}

});

});

async function enviarWhatsApp(numero,mensaje,marca){

try{

const video =
localStorage.getItem(`video_${marca}`);

const imagen =
localStorage.getItem(`imagen_${marca}`);

let response;

if(video){

response = await fetch(
`https://api.ultramsg.com/${instance}/messages/video`,
{
method:'POST',
headers:{
'Content-Type':'application/x-www-form-urlencoded'
},
body:new URLSearchParams({
token:token,
to:numero,
video:video,
caption:mensaje,
mime_type:'video/mp4'
})
});

}else if(imagen){

response = await fetch(
`https://api.ultramsg.com/${instance}/messages/image`,
{
method:'POST',
headers:{
'Content-Type':'application/x-www-form-urlencoded'
},
body:new URLSearchParams({
token:token,
to:numero,
image:imagen,
caption:mensaje
})
});

}else{

response = await fetch(
`https://api.ultramsg.com/${instance}/messages/chat`,
{
method:'POST',
headers:{
'Content-Type':'application/x-www-form-urlencoded'
},
body:new URLSearchParams({
token:token,
to:numero,
body:mensaje
})
});

}

const data = await response.json();

console.log(data);

return true;

}catch(error){

console.log(error);

return false;

}

}

async function agregar(){

const nombre = document.getElementById('nombre').value.trim();

const telefono = document.getElementById('telefono').value.trim();

const marca = document.getElementById('marca').value;

const tipo = document.getElementById('tipo').value;

const fecha = document.getElementById('fecha').value;

if(!nombre || !telefono || !fecha){

mostrarEstado('Completa todos los campos','error');

return;

}

contactos.push({
nombre,
telefono,
marca,
tipo,
fecha
});

localStorage.setItem(
'contactos',
JSON.stringify(contactos)
);

render();

const plantilla =
localStorage.getItem(`plantilla_${marca}`);

const mensaje =
plantilla.replace('{nombre}',nombre);

await enviarWhatsApp(
telefono,
mensaje,
marca
);

mostrarEstado(
'Contacto agregado y mensaje enviado',
'success'
);

document.getElementById('nombre').value='';
document.getElementById('telefono').value='';
document.getElementById('fecha').value='';

}

function eliminarContacto(index){

if(confirm('¿Eliminar contacto?')){

contactos.splice(index,1);

localStorage.setItem(
'contactos',
JSON.stringify(contactos)
);

render();

mostrarEstado(
'Contacto eliminado',
'success'
);

}

}

function render(){

const tabla = document.getElementById('tabla');

tabla.innerHTML='';

if(contactos.length===0){

tabla.innerHTML=`
<tr>
<td colspan="6">
No hay contactos registrados
</td>
</tr>
`;

return;

}

contactos.forEach((c,index)=>{

tabla.innerHTML += `
<tr>

<td>${c.nombre}</td>

<td>${c.telefono}</td>

<td>${c.marca}</td>

<td>${c.tipo}</td>

<td>${c.fecha}</td>

<td>
<button
class="btn-delete"
onclick="eliminarContacto(${index})">
🗑️ Eliminar
</button>
</td>

</tr>
`;

});

}

function guardarPlantillas(){

['ADMIN','ADO','SUR','TRT']
.forEach(marca=>{

localStorage.setItem(
`plantilla_${marca}`,
document.getElementById(
`plantilla_${marca}`
).value
);

localStorage.setItem(
`video_${marca}`,
document.getElementById(
`video_${marca}`
).value
);

localStorage.setItem(
`imagen_${marca}`,
document.getElementById(
`imagen_${marca}`
).value
);

});

mostrarEstado(
'Plantillas guardadas',
'success'
);

}

function verificarEventos(){

const hoy = new Date();

const mes =
String(hoy.getMonth()+1).padStart(2,'0');

const dia =
String(hoy.getDate()).padStart(2,'0');

const hoyFormato = `${mes}-${dia}`;

contactos.forEach(async contacto=>{

const fecha = contacto.fecha.substring(5);

const llave =
`enviado_${contacto.telefono}_${hoyFormato}`;

if(
fecha === hoyFormato &&
!localStorage.getItem(llave)
){

const plantilla =
localStorage.getItem(
`plantilla_${contacto.marca}`
);

const mensaje =
plantilla.replace(
'{nombre}',
contacto.nombre
);

await enviarWhatsApp(
contacto.telefono,
mensaje,
contacto.marca
);

localStorage.setItem(llave,'si');

console.log(
'Mensaje enviado a',
contacto.nombre
);

}

});

}

setInterval(verificarEventos,60000);

render();

</script>

</body>
</html>
