<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Moments CRM</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#f4f5fb;
margin:0;
padding:40px;
}

.container{
max-width:1300px;
margin:auto;
background:white;
padding:30px;
border-radius:24px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
color:#7e22ce;
}

.card{
background:#faf7ff;
padding:20px;
border-radius:20px;
margin-top:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.marca-box{
background:white;
padding:16px;
border-radius:18px;
border:1px solid #eee;
}

input,textarea,select{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #ddd;
margin-top:10px;
margin-bottom:15px;
font-size:15px;
box-sizing:border-box;
}

button{
padding:14px 20px;
border:none;
background:#7e22ce;
color:white;
border-radius:14px;
cursor:pointer;
font-weight:600;
margin-top:10px;
}

button:hover{
opacity:.95;
}

.btn-delete{
background:#ef4444;
padding:10px 14px;
font-size:13px;
}

.preview{
width:100%;
max-height:220px;
object-fit:cover;
border-radius:14px;
margin-top:10px;
display:none;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
padding:14px;
border-bottom:1px solid #eee;
text-align:left;
font-size:14px;
}

.status{
padding:12px;
border-radius:12px;
margin-top:15px;
display:none;
font-weight:500;
}

.success{
background:#dcfce7;
color:#166534;
}

.error{
background:#fee2e2;
color:#991b1b;
}

@media(max-width:768px){

body{
padding:15px;
}

table{
display:block;
overflow-x:auto;
}

}

</style>
</head>

<body>

<div class="container">

<h1>🎉 Happy Moments CRM</h1>

<div class="card">
<h2>UltraMSG conectado</h2>
<p><b>Instancia:</b> instance174263</p>
</div>

<div class="card">

<h2>Agregar contacto</h2>

<input type="text" id="nombre" placeholder="Nombre">

<input type="text" id="telefono" placeholder="WhatsApp 521XXXXXXXXXX">

<select id="marca">
<option value="ADMIN">ADMIN</option>
<option value="ADO">ADO</option>
<option value="SUR">SUR</option>
<option value="TRT">TRT</option>
</select>

<select id="tipo">
<option value="cumpleaños">Cumpleaños</option>
<option value="aniversario">Aniversario</option>
</select>

<input type="date" id="fecha">

<button onclick="agregar()">Agregar contacto</button>

<div id="estado" class="status"></div>

</div>

<div class="card">

<h2>Plantillas por marca</h2>

<div class="grid">

<div class="marca-box">

<h3>ADMIN</h3>

<textarea id="plantilla_ADMIN">🎉 Hola {nombre}, ADMIN te desea un excelente día.</textarea>

<input type="file" id="archivo_ADMIN" accept="image/*,video/*">

<img id="img_ADMIN" class="preview">

<video id="video_ADMIN" class="preview" controls></video>

</div>

<div class="marca-box">

<h3>ADO</h3>

<textarea id="plantilla_ADO">🎉 Hola {nombre}, ADO te desea un excelente día.</textarea>

<input type="file" id="archivo_ADO" accept="image/*,video/*">

<img id="img_ADO" class="preview">

<video id="video_ADO" class="preview" controls></video>

</div>

<div class="marca-box">

<h3>SUR</h3>

<textarea id="plantilla_SUR">🎉 Hola {nombre}, SUR te desea un excelente día.</textarea>

<input type="file" id="archivo_SUR" accept="image/*,video/*">

<img id="img_SUR" class="preview">

<video id="video_SUR" class="preview" controls></video>

</div>

<div class="marca-box">

<h3>TRT</h3>

<textarea id="plantilla_TRT">🎉 Hola {nombre}, TRT te desea un excelente día.</textarea>

<input type="file" id="archivo_TRT" accept="image/*,video/*">

<img id="img_TRT" class="preview">

<video id="video_TRT" class="preview" controls></video>

</div>

</div>

<button onclick="guardarPlantillas()">
Guardar plantillas
</button>

</div>

<div class="card">

<h2>Contactos</h2>

<table>

<thead>

<tr>
<th>Nombre</th>
<th>WhatsApp</th>
<th>Marca</th>
<th>Evento</th>
<th>Fecha</th>
<th>Acción</th>
</tr>

</thead>

<tbody id="tabla"></tbody>

</table>

</div>

</div>

<script>

const instance = 'instance174263';

const token = 'a7hqz1tofhwq65b4';

const SHEET_URL =
'https://opensheet.elk.sh/1nojKLQL2J4OZlrf2zxPHWuSwagHR8etSYrC7Pvrus4g/1';

const SCRIPT_URL =
'https://script.google.com/macros/s/AKfycbzUX-hDUuKcj_we3d9GHsT8MCm0W0Er-nYKHqZsZigpmk1S6zWAuYMtPiFRV4uDjc0m/exec';

let contactos = [];

let archivos = {};

let tipos = {};

const estado = document.getElementById('estado');

function mostrarEstado(texto,tipo){

estado.style.display='block';

estado.className=`status ${tipo}`;

estado.innerText=texto;

setTimeout(()=>{
estado.style.display='none';
},4000);

}

async function cargarContactosDesdeSheet(){

try{

const response = await fetch(
SHEET_URL + '?t=' + new Date().getTime()
);

contactos = await response.json();

render();

console.log(contactos);

}catch(error){

console.log(error);

mostrarEstado(
'Error cargando Google Sheets',
'error'
);

}

}

['ADMIN','ADO','SUR','TRT'].forEach(marca=>{

const textarea = document.getElementById(`plantilla_${marca}`);

textarea.value =
localStorage.getItem(`plantilla_${marca}`) ||
textarea.value;

const img = document.getElementById(`img_${marca}`);

const video = document.getElementById(`video_${marca}`);

document
.getElementById(`archivo_${marca}`)
.addEventListener('change',function(e){

const file = e.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(event){

archivos[marca] = event.target.result;

tipos[marca] = file.type;

img.style.display='none';

video.style.display='none';

if(file.type.startsWith('image')){

img.src = event.target.result;

img.style.display='block';

}else if(file.type.startsWith('video')){

video.src = event.target.result;

video.style.display='block';

}

mostrarEstado(
`Archivo cargado para ${marca}`,
'success'
);

};

reader.readAsDataURL(file);

});

});

async function enviarWhatsApp(numero,mensaje,marca){

try{

const archivo = archivos[marca];

const tipo = tipos[marca];

let response;

if(archivo){

if(tipo.startsWith('image')){

response = await fetch(
`https://api.ultramsg.com/${instance}/messages/image`,
{
method:'POST',
headers:{
'Content-Type':'application/x-www-form-urlencoded'
},
body:new URLSearchParams({
token:token,
to:numero,
image:archivo,
caption:mensaje
})
});

}else if(tipo.startsWith('video')){

response = await fetch(
`https://api.ultramsg.com/${instance}/messages/video`,
{
method:'POST',
headers:{
'Content-Type':'application/x-www-form-urlencoded'
},
body:new URLSearchParams({
token:token,
to:numero,
video:archivo,
caption:mensaje
})
});

}

}else{

response = await fetch(
`https://api.ultramsg.com/${instance}/messages/chat`,
{
method:'POST',
headers:{
'Content-Type':'application/x-www-form-urlencoded'
},
body:new URLSearchParams({
token:token,
to:numero,
body:mensaje
})
});

}

const data = await response.json();

console.log(data);

return true;

}catch(error){

console.log(error);

return false;

}

}

async function agregar(){

const nombre =
document.getElementById('nombre').value.trim();

const telefono =
document.getElementById('telefono').value.trim();

const marca =
document.getElementById('marca').value;

const tipo =
document.getElementById('tipo').value;

const fecha =
document.getElementById('fecha').value;

if(!nombre || !telefono || !fecha){

mostrarEstado(
'Completa todos los campos',
'error'
);

return;

}

const nuevoContacto = {
nombre,
telefono,
marca,
tipo,
fecha
};

contactos.push(nuevoContacto);

render();

try{

await fetch(SCRIPT_URL,{
method:'POST',
body:JSON.stringify(nuevoContacto)
});

console.log('Guardado en Google Sheets');

setTimeout(()=>{
cargarContactosDesdeSheet();
},2000);

}catch(error){

console.log(error);

mostrarEstado(
'Error guardando en Google Sheets',
'error'
);

}

const plantilla =
localStorage.getItem(`plantilla_${marca}`);

const mensaje =
plantilla.replace('{nombre}',nombre);

await enviarWhatsApp(
telefono,
mensaje,
marca
);

mostrarEstado(
'Contacto agregado y guardado',
'success'
);

document.getElementById('nombre').value='';

document.getElementById('telefono').value='';

document.getElementById('fecha').value='';

}

function eliminarContacto(index){

if(confirm('¿Eliminar contacto?')){

contactos.splice(index,1);

render();

mostrarEstado(
'Contacto eliminado',
'success'
);

}

}

function render(){

const tabla =
document.getElementById('tabla');

tabla.innerHTML='';

if(contactos.length===0){

tabla.innerHTML=`
<tr>
<td colspan="6">
No hay contactos registrados
</td>
</tr>
`;

return;

}

contactos.forEach((c,index)=>{

tabla.innerHTML += `
<tr>

<td>${c.nombre}</td>

<td>${c.telefono}</td>

<td>${c.marca}</td>

<td>${c.tipo}</td>

<td>${c.fecha}</td>

<td>
<button
class="btn-delete"
onclick="eliminarContacto(${index})">
🗑️ Eliminar
</button>
</td>

</tr>
`;

});

}

function guardarPlantillas(){

['ADMIN','ADO','SUR','TRT']
.forEach(marca=>{

localStorage.setItem(
`plantilla_${marca}`,
document.getElementById(
`plantilla_${marca}`
).value
);

});

mostrarEstado(
'Plantillas guardadas',
'success'
);

}

function verificarEventos(){

const hoy = new Date();

const mes =
String(hoy.getMonth()+1).padStart(2,'0');

const dia =
String(hoy.getDate()).padStart(2,'0');

const hoyFormato = `${mes}-${dia}`;

contactos.forEach(async contacto=>{

const fecha = contacto.fecha.substring(5);

const llave =
`enviado_${contacto.telefono}_${hoyFormato}`;

if(
fecha === hoyFormato &&
!localStorage.getItem(llave)
){

const plantilla =
localStorage.getItem(
`plantilla_${contacto.marca}`
);

const mensaje =
plantilla.replace(
'{nombre}',
contacto.nombre
);

await enviarWhatsApp(
contacto.telefono,
mensaje,
contacto.marca
);

localStorage.setItem(llave,'si');

console.log(
'Mensaje enviado a',
contacto.nombre
);

}

});

}

setInterval(verificarEventos,60000);

cargarContactosDesdeSheet();

setInterval(cargarContactosDesdeSheet,30000);

</script>

</body>
</html>
