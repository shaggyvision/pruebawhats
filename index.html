<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Happy Moments</title>

<style>
body{font-family:sans-serif;background:#f4f5fb;padding:20px;}
.container{max-width:1000px;margin:auto;background:white;padding:20px;border-radius:20px;}

.tabs{display:flex;gap:10px;margin-bottom:20px;justify-content:center;}

.tab{
 padding:10px 15px;
 background:#ddd;
 cursor:pointer;
 border-radius:8px;
}

.tab.active{
 background:#7e22ce;
 color:white;
}

.section{display:none;}
.section.active{display:block;}

input, textarea, select{
 width:100%;
 padding:10px;
 margin-top:10px;
}

button{
 padding:10px;
 border:none;
 cursor:pointer;
 border-radius:8px;
 color:white;
 display:flex;
 align-items:center;
 gap:6px;
}

.save{background:#7e22ce;}
.send{background:#16a34a;}
.delete{background:#dc2626;}

table{width:100%;margin-top:20px;border-collapse:collapse;}
td,th{padding:10px;border-bottom:1px solid #ddd;}
</style>

</head>
<body>

<div class="container">

<div class="tabs">
 <div class="tab active" data-tab="contacto">Contacto</div>
 <div class="tab" data-tab="plantilla">Plantilla</div>
 <div class="tab" data-tab="lista">Contactos</div>
</div>

<!-- CONTACTO -->
<div id="contacto" class="section active">

<h3>Agregar contacto</h3>

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="521XXXXXXXXXX">

<select id="marca">
<option>ADMIN</option>
<option>ADO</option>
<option>SUR</option>
<option>TRT</option>
</select>

<input type="date" id="fecha">

<button class="save" onclick="agregarContacto()">✅ Guardar</button>

</div>

<!-- PLANTILLA -->
<div id="plantilla" class="section">

<h3>Crear plantilla</h3>

<select id="marcaPlantilla">
<option>ADMIN</option>
<option>ADO</option>
<option>SUR</option>
<option>TRT</option>
</select>

<textarea id="textoPlantilla">Hola {Nombre}</textarea>
<input id="urlMedia" placeholder="URL imagen (.jpg, .png...)">

<button class="save" onclick="guardarPlantilla()">💾 Guardar</button>

</div>

<!-- CONTACTOS -->
<div id="lista" class="section">

<h3>Contactos</h3>

<table>
<thead>
<tr>
<th>Nombre</th>
<th>Teléfono</th>
<th>Área</th>
<th>Acción</th>
</tr>
</thead>

<tbody id="tabla"></tbody>
</table>

</div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzUX-hDUuKcj_we3d9GHsT8MCm0W0Er-nYKHqZsZigpmk1S6zWAuYMtPiFRV4uDjc0m/exec";

let contactos = [];
let plantillas = [];

document.addEventListener("DOMContentLoaded", function(){

document.querySelectorAll(".tab").forEach(tab=>{
tab.addEventListener("click", function(){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
this.classList.add("active");
let id = this.dataset.tab;
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
});
});

cargarContactos();
cargarPlantillas();

});

//////////////////////////////////////////////////

async function cargarContactos(){
let res = await fetch(SCRIPT_URL);
contactos = await res.json();
render();
}

async function agregarContacto(){

let nombre = document.getElementById("nombre").value;
let telefono = document.getElementById("telefono").value;
let marca = document.getElementById("marca").value;
let fecha = document.getElementById("fecha").value;

await fetch(SCRIPT_URL,{
method:"POST",
headers:{'Content-Type':'text/plain'},
body:JSON.stringify({nombre,telefono,marca,fecha})
});

alert("✅ Guardado");
cargarContactos();
}

//////////////////////////////////////////////////

async function cargarPlantillas(){
let res = await fetch(SCRIPT_URL + "?tipo=plantillas");
plantillas = await res.json();
}

//////////////////////////////////////////////////

function render(){

let t = document.getElementById("tabla");
t.innerHTML = "";

contactos.forEach(c=>{

t.innerHTML += `
<tr>
<td>${c.nombre}</td>
<td>${c.telefono}</td>
<td>${c.marca}</td>
<td>

<button class="send"
data-tel="${c.telefono}"
data-nombre="${c.nombre}"
data-marca="${c.marca}"
onclick="enviarDesdeBoton(this)">
📲
</button>

</td>
</tr>
`;

});

}

//////////////////////////////////////////////////

function enviarDesdeBoton(btn){

let telefono = btn.dataset.tel.replace(/\D/g,'');
let nombre = btn.dataset.nombre;
let marca = btn.dataset.marca;

enviarAhora(telefono, nombre, marca);

}

//////////////////////////////////////////////////

function esImagenValida(url){
return /\.(jpeg|jpg|png|webp)$/i.test(url);
}

function enviarAhora(telefono,nombre,marca){

let plantilla = plantillas.find(p => p.marca === marca);

let mensaje = plantilla
? plantilla.plantilla.replace("{Nombre}", nombre)
: "Hola " + nombre;

let media = plantilla ? (plantilla.archivo || plantilla.archivoURLmanual) : "";

if(media && esImagenValida(media)){

let url = `https://api.ultramsg.com/instance174263/messages/image?token=a7hqz1tofhwq65b4&to=${telefono}&image=${encodeURIComponent(media)}&caption=${encodeURIComponent(mensaje)}`;
window.open(url, "_blank");

}else{

let url = `https://api.ultramsg.com/instance174263/messages/chat?token=a7hqz1tofhwq65b4&to=${telefono}&body=${encodeURIComponent(mensaje)}`;
window.open(url, "_blank");

}

alert("✅ Enviando a " + telefono);

}

</script>

</body>
</html>
