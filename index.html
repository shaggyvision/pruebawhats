<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Happy Moments CRM</title>

<style>
body{font-family:sans-serif;background:#f4f5fb;padding:40px;}
.container{max-width:1100px;margin:auto;background:white;padding:30px;border-radius:20px;}
input, textarea, select{width:100%;padding:12px;margin-top:10px;}
button{padding:10px;background:#7e22ce;color:white;border:none;margin-top:10px;cursor:pointer;border-radius:8px;}
.delete{background:#dc2626;}
.table-btn{display:flex;gap:5px;}
table{width:100%;margin-top:20px;border-collapse:collapse;}
td,th{padding:10px;border-bottom:1px solid #ddd;}
.status{padding:10px;margin-top:10px;display:none;}
.success{background:#dcfce7;}
.error{background:#fee2e2;}
</style>
</head>

<body>

<div class="container">
<h1>🎉 Happy Moments CRM PRO</h1>

<h2>Agregar contacto</h2>

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="521XXXXXXXXXX">

<select id="marca">
<option>ADMIN</option>
<option>ADO</option>
<option>SUR</option>
<option>TRT</option>
</select>

<select id="tipo">
<option value="cumpleaños">Cumpleaños</option>
<option value="aniversario">Aniversario</option>
</select>

<input type="date" id="fecha">

<button onclick="agregarContacto()">Guardar + Enviar</button>

<div id="estado" class="status"></div>

<h2>Plantilla por área</h2>

<textarea id="plantilla">🎉 Hola {Nombre}, feliz día 🎉</textarea>

<input type="file" id="archivo" accept="image/*">
<input type="text" id="archivoURL" placeholder="Pegar URL de video o imagen (Drive recomendado)">

<button onclick="guardarPlantilla()">Guardar plantilla</button>

<h2>Contactos</h2>

<table>
<thead>
<tr>
<th>Nombre</th>
<th>Teléfono</th>
<th>Marca</th>
<th>Tipo</th>
<th>Fecha</th>
<th>Acción</th>
</tr>
</thead>

<tbody id="tabla"></tbody>
</table>

</div>

<script>

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzUX-hDUuKcj_we3d9GHsT8MCm0W0Er-nYKHqZsZigpmk1S6zWAuYMtPiFRV4uDjc0m/exec';
const instance = 'instance174263';
const token = 'a7hqz1tofhwq65b4';

let contactos = [];
let plantillas = [];

function mostrarEstado(texto,tipo){
let e = document.getElementById('estado');
e.style.display='block';
e.className=`status ${tipo}`;
e.innerText=texto;
setTimeout(()=>{e.style.display='none';},4000);
}

//////////////////////////////////////////////////
// CONTACTOS
//////////////////////////////////////////////////
async function cargarContactos(){
try{
let res = await fetch(SCRIPT_URL);
contactos = await res.json();
render();
}catch(e){
mostrarEstado('Error cargando','error');
}
}

//////////////////////////////////////////////////
// PLANTILLAS
//////////////////////////////////////////////////
async function cargarPlantillas(){
let res = await fetch(SCRIPT_URL+'?tipo=plantillas');
plantillas = await res.json();
}

//////////////////////////////////////////////////
// GUARDAR CONTACTO
//////////////////////////////////////////////////
async function agregarContacto(){

let nombre = document.getElementById('nombre').value;
let telefono = document.getElementById('telefono').value;
let marca = document.getElementById('marca').value;
let tipo = document.getElementById('tipo').value;
let fecha = document.getElementById('fecha').value;

let mensaje = generarMensaje(nombre,marca);
let plantilla = plantillas.find(p=>p.marca===marca);
let media = plantilla ? plantilla.archivo : '';

await fetch(SCRIPT_URL,{
method:'POST',
headers:{'Content-Type':'text/plain'},
body:JSON.stringify({nombre,telefono,marca,tipo,fecha})
});

await enviarWhatsApp(telefono,mensaje,media);

mostrarEstado('Guardado ✅','success');
setTimeout(cargarContactos,1000);
}

//////////////////////////////////////////////////
// BORRAR
//////////////////////////////////////////////////
async function borrarContacto(telefono){
if(!confirm("¿Eliminar?")) return;

await fetch(SCRIPT_URL,{
method:'POST',
headers:{'Content-Type':'text/plain'},
body:JSON.stringify({accion:'borrar',telefono})
});

mostrarEstado('Eliminado','success');
cargarContactos();
}

//////////////////////////////////////////////////
// GUARDAR PLANTILLA
//////////////////////////////////////////////////
async function guardarPlantilla(){

let plantilla = document.getElementById('plantilla').value;
let marca = document.getElementById('marca').value;

let archivoInput = document.getElementById('archivo');
let archivoURLmanual = document.getElementById('archivoURL').value;

let archivoBase64 = '';
let nombreArchivo = '';

if(archivoInput.files.length>0){
let file = archivoInput.files[0];
nombreArchivo = file.name;
archivoBase64 = await convertirBase64(file);
}

await fetch(SCRIPT_URL,{
method:'POST',
headers:{'Content-Type':'text/plain'},
body:JSON.stringify({
tipoOperacion:'guardarPlantilla',
marca:marca,
plantilla:plantilla,
archivoBase64:archivoBase64,
nombreArchivo:nombreArchivo,
archivoURLmanual:archivoURLmanual
})
});

mostrarEstado('Plantilla guardada ✅','success');
cargarPlantillas();
}

function convertirBase64(file){
return new Promise((res,rej)=>{
let reader=new FileReader();
reader.readAsDataURL(file);
reader.onload=()=>res(reader.result);
reader.onerror=err=>rej(err);
});
}

//////////////////////////////////////////////////
// GENERAR MENSAJE
//////////////////////////////////////////////////
function generarMensaje(nombre,marca){
let p = plantillas.find(p=>p.marca===marca);
if(!p) return "Hola "+nombre;
return p.plantilla.replace('{Nombre}',nombre);
}

//////////////////////////////////////////////////
// WHATSAPP
//////////////////////////////////////////////////
async function enviarWhatsApp(telefono,mensaje,media){

if(media){
await fetch(`https://api.ultramsg.com/${instance}/messages/image`,{
method:'POST',
headers:{'Content-Type':'application/x-www-form-urlencoded'},
body:new URLSearchParams({
token:token,
to:telefono,
image:media,
caption:mensaje
})
});
}else{
await fetch(`https://api.ultramsg.com/${instance}/messages/chat`,{
method:'POST',
headers:{'Content-Type':'application/x-www-form-urlencoded'},
body:new URLSearchParams({
token:token,
to:telefono,
body:mensaje
})
});
}
}

//////////////////////////////////////////////////
// ENVÍO AUTOMÁTICO 🎂
//////////////////////////////////////////////////
function envioAutomatico(){

let hoy = new Date().toISOString().split('T')[0];

contactos.forEach(c=>{
if(c.fecha === hoy){
enviarWhatsApp(
c.telefono,
generarMensaje(c.nombre,c.marca),
(plantillas.find(p=>p.marca===c.marca)||{}).archivo
);
}
});

}

//////////////////////////////////////////////////
// TABLA
//////////////////////////////////////////////////
function render(){

let tabla = document.getElementById('tabla');
tabla.innerHTML='';

if(contactos.length===0){
tabla.innerHTML='<tr><td colspan="6">Sin datos</td></tr>';
return;
}

contactos.forEach(c=>{
tabla.innerHTML+=`
<tr>
<td>${c.nombre}</td>
<td>${c.telefono}</td>
<td>${c.marca}</td>
<td>${c.tipo}</td>
<td>${c.fecha}</td>
<td>
<div class="table-btn">
<button onclick="enviarAhora('${c.telefono}','${c.nombre}','${c.marca}')">📲</button>
<button class="delete" onclick="borrarContacto('${c.telefono}')">🗑</button>
</div>
</td>
</tr>
`;
});
}

async function enviarAhora(t,n,m){
let media=(plantillas.find(p=>p.marca===m)||{}).archivo;
await enviarWhatsApp(t,generarMensaje(n,m),media);
mostrarEstado('Enviado ✅','success');
}

//////////////////////////////////////////////////
// INIT
//////////////////////////////////////////////////
window.onload=()=>{
cargarContactos();
cargarPlantillas();
setInterval(envioAutomatico,60000); // ✅ automático cada minuto
};

</script>

</body>
</html>
