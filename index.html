<script>

const SCRIPT_URL='https://script.google.com/macros/s/AKfycbzUX-hDUuKcj_we3d9GHsT8MCm0W0Er-nYKHqZsZigpmk1S6zWAuYMtPiFRV4uDjc0m/exec';

const instance='instance174263';
const token='a7hqz1tofhwq65b4';

let contactos=[];
let plantillas=[];

//////////////////////////////////////////////////
// ✅ INICIO
//////////////////////////////////////////////////
document.addEventListener("DOMContentLoaded", function(){

document.querySelectorAll('.tab').forEach(tab => {

tab.addEventListener('click', function(){

document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
tab.classList.add('active');

document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));

let id=tab.getAttribute('data-tab');
document.getElementById(id).classList.add('active');

});

});

cargarContactos();
cargarPlantillas();

});

//////////////////////////////////////////////////
// ✅ CONTACTOS
//////////////////////////////////////////////////
async function cargarContactos(){
let res=await fetch(SCRIPT_URL);
contactos=await res.json();
render();
}

async function agregarContacto(){

let nombre=document.getElementById('nombre').value;
let telefono=document.getElementById('telefono').value;
let marca=document.getElementById('marca').value;
let fecha=document.getElementById('fecha').value;

await fetch(SCRIPT_URL,{
method:'POST',
headers:{'Content-Type':'text/plain'},
body:JSON.stringify({nombre,telefono,marca,fecha})
});

alert("Guardado ✅");
cargarContactos();
}

//////////////////////////////////////////////////
// ✅ BORRAR CONTACTO 🗑
//////////////////////////////////////////////////
async function borrarContacto(telefono){

if(!confirm("¿Eliminar este contacto?")) return;

await fetch(SCRIPT_URL,{
method:'POST',
headers:{'Content-Type':'text/plain'},
body:JSON.stringify({
accion:'borrar',
telefono:telefono
})
});

alert("Contacto eliminado 🗑");
cargarContactos();
}

//////////////////////////////////////////////////
// ✅ PLANTILLAS
//////////////////////////////////////////////////
async function cargarPlantillas(){
let res=await fetch(SCRIPT_URL+'?tipo=plantillas');
plantillas=await res.json();
renderPlantillas();
}

async function guardarPlantilla(){

let marca=document.getElementById('marcaPlantilla').value;
let plantilla=document.getElementById('textoPlantilla').value;
let url=document.getElementById('urlMedia').value;

await fetch(SCRIPT_URL,{
method:'POST',
headers:{'Content-Type':'text/plain'},
body:JSON.stringify({
tipoOperacion:'guardarPlantilla',
marca:marca,
plantilla:plantilla,
archivoURLmanual:url
})
});

alert("Plantilla guardada ✅");
cargarPlantillas();
}

//////////////////////////////////////////////////
// ✅ TABLA CONTACTOS (BOTÓN DOBLE)
//////////////////////////////////////////////////
function render(){

let t=document.getElementById('tabla');
t.innerHTML='';

contactos.forEach(c=>{

t.innerHTML+=`
<tr>
<td>${c.nombre}</td>
<td>${c.telefono}</td>
<td>${c.marca}</td>
<td>${c.fecha}</td>
<td>
  <button onclick="enviarAhora('${c.telefono}','${c.nombre}','${c.marca}')">
    📲
  </button>

  <button onclick="borrarContacto('${c.telefono}')" style="background:#dc2626">
    🗑
  </button>
</td>
</tr>
`;

});
}

//////////////////////////////////////////////////
// ✅ TABLA PLANTILLAS
//////////////////////////////////////////////////
function renderPlantillas(){

let t=document.getElementById('tablaPlantillas');
t.innerHTML='';

plantillas.forEach(p=>{

t.innerHTML+=`
<tr>
<td>${p.marca}</td>
<td>${p.plantilla}</td>
<td>${p.archivo ? '✅' : '—'}</td>
</tr>
`;

});
}

//////////////////////////////////////////////////
// ✅ ENVIAR WHATSAPP
//////////////////////////////////////////////////
async function enviarAhora(telefono,nombre,marca){

let plantilla = plantillas.find(p => p.marca === marca);

let mensaje = plantilla 
  ? plantilla.plantilla.replace('{Nombre}', nombre)
  : "Hola " + nombre;

let media = plantilla ? plantilla.archivo : '';

try{

if(media){
await fetch(`https://api.ultramsg.com/${instance}/messages/image`,{
method:'POST',
headers:{'Content-Type':'application/x-www-form-urlencoded'},
body:new URLSearchParams({
token:token,
to:telefono,
image:media,
caption:mensaje
})
});
}else{
await fetch(`https://api.ultramsg.com/${instance}/messages/chat`,{
method:'POST',
headers:{'Content-Type':'application/x-www-form-urlencoded'},
body:new URLSearchParams({
token:token,
to:telefono,
body:mensaje
})
});
}

alert("Mensaje enviado ✅");

}catch(e){
alert("Error enviando");
console.error(e);
}

}

</script>
