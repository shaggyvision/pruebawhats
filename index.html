<script>

const SCRIPT_URL = 
'https://script.google.com/macros/s/AKfycbzUX-hDUuKcj_we3d9GHsT8MCm0W0Er-nYKHqZsZigpmk1S6zWAuYMtPiFRV4uDjc0m/exec';

const instance = 'instance174263';
const token = 'a7hqz1tofhwq65b4';

let contactos = [];


// ✅ MENSAJES
function mostrarEstado(texto,tipo){
const estado = document.getElementById('estado');
estado.style.display='block';
estado.className=`status ${tipo}`;
estado.innerText=texto;

setTimeout(()=>{
estado.style.display='none';
},4000);
}


// ✅ ENVIAR WHATSAPP
async function enviarWhatsApp(telefono, mensaje){
try{
const response = await fetch(
`https://api.ultramsg.com/${instance}/messages/chat`,
{
method:'POST',
headers:{
'Content-Type':'application/x-www-form-urlencoded'
},
body:new URLSearchParams({
token:token,
to:telefono,
body:mensaje,
priority:10
})
}
);

const data = await response.json();
console.log("UltraMsg:", data);

}catch(error){
console.error(error);
}
}


// ✅ PLANTILLA ADMIN
function generarMensaje(nombre, marca){

let plantilla = document.getElementById(`plantilla_${marca}`).value;

if(!plantilla){
plantilla = document.getElementById('plantilla_ADMIN').value;
}

return plantilla.replace('{Nombre}', nombre);
}


// ✅ CARGAR CONTACTOS DESDE SHEETS
async function cargarContactos(){

try{
const response = await fetch(
SCRIPT_URL + '?t=' + new Date().getTime()
);

contactos = await response.json();
render();

}catch(error){
console.log(error);
mostrarEstado('Error cargando contactos','error');
}
}


// ✅ AGREGAR CONTACTO
async function agregarContacto(){

const nombre = document.getElementById('nombre').value;
const telefono = document.getElementById('telefono').value;
const marca = document.getElementById('marca').value;
const tipo = document.getElementById('tipo').value;
const fecha = document.getElementById('fecha').value;

const mensaje = generarMensaje(nombre, marca);

try{

// ✅ GUARDA EN GOOGLE SHEETS
await fetch(SCRIPT_URL,{
method:'POST',
headers:{
'Content-Type':'text/plain;charset=utf-8'
},
body:JSON.stringify({
nombre,
telefono,
marca,
tipo,
fecha
})
});

mostrarEstado('Contacto guardado','success');


// ✅ ENVÍA WHATSAPP AUTOMÁTICO
await enviarWhatsApp(telefono, mensaje);


// recargar tabla
setTimeout(()=>{
cargarContactos();
},1000);

}catch(error){
console.log(error);
mostrarEstado('Error guardando contacto','error');
}
}


// ✅ BOTÓN ENVIAR AHORA
async function enviarAhora(telefono,nombre,marca){

const mensaje = generarMensaje(nombre, marca);

await enviarWhatsApp(telefono, mensaje);

mostrarEstado('Mensaje enviado ✅','success');
}


// ✅ RENDER TABLA
function render(){

const tabla = document.getElementById('tabla');
tabla.innerHTML='';

if(contactos.length===0){
tabla.innerHTML=`<tr><td colspan="6">No hay contactos</td></tr>`;
return;
}

contactos.forEach(c => {

tabla.innerHTML += `
<tr>
<td>${c.nombre || ''}</td>
<td>${c.telefono || ''}</td>
<td>${c.marca || ''}</td>
<td>${c.tipo || ''}</td>
<td>${c.fecha || ''}</td>
<td>
<button onclick="enviarAhora('${c.telefono}','${c.nombre}','${c.marca}')">
📲 Enviar ahora
</button>
</td>
</tr>
`;

});

}


// ✅ INICIO AUTOMÁTICO
cargarContactos();
setInterval(cargarContactos,30000);

</script>
