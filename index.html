<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Moments CRM</title>

<style>
body{
  font-family:sans-serif;
  background:#f4f5fb;
  padding:40px;
}
.container{
  max-width:1100px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:20px;
}
input, textarea, select{
  width:100%;
  padding:12px;
  margin-top:10px;
}
button{
  padding:10px;
  background:#7e22ce;
  color:white;
  border:none;
  margin-top:10px;
  cursor:pointer;
  border-radius:8px;
}
.delete{
  background:#dc2626;
}
.table-btn{
  display:flex;
  gap:5px;
}
table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}
td,th{
  padding:10px;
  border-bottom:1px solid #ddd;
}
.status{
  padding:10px;
  margin-top:10px;
  display:none;
}
.success{background:#dcfce7;}
.error{background:#fee2e2;}
</style>
</head>

<body>

<div class="container">

<h1>🎉 Happy Moments CRM</h1>

<h2>Agregar contacto</h2>

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="521XXXXXXXXXX">

<select id="marca">
  <option value="ADMIN">ADMIN</option>
  <option value="ADO">ADO</option>
  <option value="SUR">SUR</option>
  <option value="TRT">TRT</option>
</select>

<select id="tipo">
  <option value="cumpleaños">Cumpleaños</option>
  <option value="aniversario">Aniversario</option>
</select>

<input type="date" id="fecha">

<button onclick="agregarContacto()">
Guardar + Enviar WhatsApp
</button>

<div id="estado" class="status"></div>

<h2>Plantillas</h2>

<textarea id="plantilla_ADMIN">
🎉 Hola {Nombre}, hoy celebramos algo especial 🎉
</textarea>

<h2>Contactos</h2>

<table>
<thead>
<tr>
<th>Nombre</th>
<th>Teléfono</th>
<th>Marca</th>
<th>Tipo</th>
<th>Fecha</th>
<th>Acción</th>
</tr>
</thead>

<tbody id="tabla"></tbody>
</table>

</div>

<script>

// ✅ TU URL YA PUESTA
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzUX-hDUuKcj_we3d9GHsT8MCm0W0Er-nYKHqZsZigpmk1S6zWAuYMtPiFRV4uDjc0m/exec';

const instance = 'instance174263';
const token = 'a7hqz1tofhwq65b4';

let contactos = [];

//////////////////////////////////////////////////
function mostrarEstado(texto,tipo){
  const estado = document.getElementById('estado');
  estado.style.display='block';
  estado.className=`status ${tipo}`;
  estado.innerText=texto;

  setTimeout(()=>{
    estado.style.display='none';
  },4000);
}

//////////////////////////////////////////////////
// ✅ CARGAR CONTACTOS (CORREGIDO)
//////////////////////////////////////////////////
async function cargarContactos(){

  try{
    const response = await fetch(SCRIPT_URL);

    if(!response.ok){
      throw new Error('No conecta con Apps Script');
    }

    const data = await response.json();

    if(data.error){
      throw new Error(data.error);
    }

    if(!Array.isArray(data)){
      console.log("Respuesta rara:", data);
      throw new Error('Formato inválido');
    }

    contactos = data;
    render();

  }catch(error){
    console.error("ERROR REAL:", error);
    mostrarEstado('Error: ' + error.message,'error');
  }
}

//////////////////////////////////////////////////
// ✅ AGREGAR CONTACTO
//////////////////////////////////////////////////
async function agregarContacto(){

  const nombre = document.getElementById('nombre').value;
  const telefono = document.getElementById('telefono').value;
  const marca = document.getElementById('marca').value;
  const tipo = document.getElementById('tipo').value;
  const fecha = document.getElementById('fecha').value;

  if(!nombre || !telefono){
    mostrarEstado('Falta nombre o teléfono','error');
    return;
  }

  const mensaje = generarMensaje(nombre);

  try{

    await fetch(SCRIPT_URL,{
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({
        nombre,telefono,marca,tipo,fecha
      })
    });

    await enviarWhatsApp(telefono, mensaje);

    mostrarEstado('Guardado ✅','success');

    setTimeout(cargarContactos,1000);

  }catch(error){
    mostrarEstado('Error guardando','error');
  }
}

//////////////////////////////////////////////////
// ✅ BORRAR
//////////////////////////////////////////////////
async function borrarContacto(telefono){

  if(!confirm("¿Eliminar contacto?")){
    return;
  }

  try{

    await fetch(SCRIPT_URL,{
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({
        accion:'borrar',
        telefono:telefono
      })
    });

    mostrarEstado('Eliminado ✅','success');
    setTimeout(cargarContactos,1000);

  }catch(error){
    mostrarEstado('Error eliminando','error');
  }
}

//////////////////////////////////////////////////
// ✅ WHATSAPP
//////////////////////////////////////////////////
async function enviarWhatsApp(telefono, mensaje){
  try{
    await fetch(`https://api.ultramsg.com/${instance}/messages/chat`,{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:new URLSearchParams({
        token:token,
        to:telefono,
        body:mensaje
      })
    });
  }catch(error){
    console.error(error);
  }
}

//////////////////////////////////////////////////
// ✅ MENSAJE
//////////////////////////////////////////////////
function generarMensaje(nombre){
  const plantilla = document.getElementById('plantilla_ADMIN').value;
  return plantilla.replace('{Nombre}', nombre);
}

//////////////////////////////////////////////////
// ✅ ENVIAR AHORA
//////////////////////////////////////////////////
async function enviarAhora(telefono,nombre){
  const mensaje = generarMensaje(nombre);
  await enviarWhatsApp(telefono, mensaje);
  mostrarEstado('Enviado ✅','success');
}

//////////////////////////////////////////////////
// ✅ RENDER
//////////////////////////////////////////////////
function render(){

  const tabla = document.getElementById('tabla');
  tabla.innerHTML='';

  if(contactos.length === 0){
    tabla.innerHTML = `<tr><td colspan="6">Sin contactos</td></tr>`;
    return;
  }

  contactos.forEach(c=>{

    tabla.innerHTML += `
      <tr>
        <td>${c.nombre || ''}</td>
        <td>${c.telefono || ''}</td>
        <td>${c.marca || ''}</td>
        <td>${c.tipo || ''}</td>
        <td>${c.fecha || ''}</td>

        <td>
          <div class="table-btn">
            <button onclick="enviarAhora('${c.telefono}','${c.nombre}')">📲</button>
            <button class="delete" onclick="borrarContacto('${c.telefono}')">🗑</button>
          </div>
        </td>
      </tr>
    `;
  });
}

//////////////////////////////////////////////////
// ✅ INIT
//////////////////////////////////////////////////
window.onload = function(){
  cargarContactos();
  setInterval(cargarContactos,30000);
};

</script>

</body>
</html>
