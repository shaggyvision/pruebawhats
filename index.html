<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Moments CRM</title>

<style>
body{
font-family:sans-serif;
background:#f4f5fb;
padding:40px;
}
.container{
max-width:1100px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
}
input, textarea, select{
width:100%;
padding:12px;
margin-top:10px;
}
button{
padding:10px;
background:#7e22ce;
color:white;
border:none;
margin-top:10px;
cursor:pointer;
}
table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}
td,th{
padding:10px;
border-bottom:1px solid #ddd;
}
.status{
padding:10px;
margin-top:10px;
display:none;
}
.success{background:#dcfce7;}
.error{background:#fee2e2;}
</style>

</head>

<body>

<div class="container">

<h1>🎉 Happy Moments CRM</h1>

<h2>Agregar contacto</h2>

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="521XXXXXXXXXX">

<select id="marca">
<option value="ADMIN">ADMIN</option>
<option value="ADO">ADO</option>
<option value="SUR">SUR</option>
<option value="TRT">TRT</option>
</select>

<select id="tipo">
<option value="cumpleaños">Cumpleaños</option>
<option value="aniversario">Aniversario</option>
</select>

<input type="date" id="fecha">

<button onclick="agregarContacto()">
Guardar + Enviar WhatsApp
</button>

<div id="estado" class="status"></div>


<h2>Plantillas</h2>

<textarea id="plantilla_ADMIN">
🎉 Hola {Nombre}, hoy celebramos a alguien muy importante para nuestra familia Mobility ADO 🎉

Queremos desearte un feliz cumpleaños y recordarte que valoramos profundamente tu esfuerzo, compromiso y la energía que aportas cada día. Para nosotros, las fechas importantes no pasan desapercibidas, porque detrás de cada colaborador hay una historia, una persona y un motivo para celebrar.

Que este nuevo año venga lleno de alegría, salud, crecimiento y momentos especiales.
¡Gracias por ser parte de Mobility ADO! 💙
</textarea>


<h2>Contactos</h2>

<table>
<thead>
<tr>
<th>Nombre</th>
<th>Teléfono</th>
<th>Marca</th>
<th>Tipo</th>
<th>Fecha</th>
<th>Acción</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

</div>

<script>

const SCRIPT_URL =
'https://script.google.com/macros/s/AKfycbzUX-hDUuKcj_we3d9GHsT8MCm0W0Er-nYKHqZsZigpmk1S6zWAuYMtPiFRV4uDjc0m/exec';

const instance = 'instance174263';
const token = 'a7hqz1tofhwq65b4';

let contactos = [];


// ✅ MENSAJES
function mostrarEstado(texto,tipo){
const estado = document.getElementById('estado');
estado.style.display='block';
estado.className=`status ${tipo}`;
estado.innerText=texto;

setTimeout(()=>{
estado.style.display='none';
},3000);
}


// ✅ ENVIAR WHATSAPP
async function enviarWhatsApp(telefono, mensaje){
try{
const response = await fetch(
`https://api.ultramsg.com/${instance}/messages/chat`,
{
method:'POST',
headers:{
'Content-Type':'application/x-www-form-urlencoded'
},
body:new URLSearchParams({
token:token,
to:telefono,
body:mensaje
})
}
);

const data = await response.json();
console.log("UltraMsg:", data);

}catch(error){
console.error("Error UltraMsg:", error);
}
}


// ✅ GENERAR MENSAJE
function generarMensaje(nombre, marca){

let plantilla = '';

const admin = document.getElementById('plantilla_ADMIN');

if(admin && admin.value){
plantilla = admin.value;
}else{
plantilla = 'Hola {Nombre}';
}

return plantilla.replace('{Nombre}', nombre);
}


// ✅ CARGAR CONTACTOS
async function cargarContactos(){
try{
const response = await fetch(
SCRIPT_URL + '?t=' + new Date().getTime()
);

contactos = await response.json();

if(!Array.isArray(contactos)){
contactos = [];
}

render();

}catch(error){
console.log(error);
mostrarEstado('Error cargando contactos','error');
}
}


// ✅ AGREGAR CONTACTO
async function agregarContacto(){

const nombre = document.getElementById('nombre').value;
const telefono = document.getElementById('telefono').value;
const marca = document.getElementById('marca').value;
const tipo = document.getElementById('tipo').value;
const fecha = document.getElementById('fecha').value;

const mensaje = generarMensaje(nombre, marca);

try{

await fetch(SCRIPT_URL,{
method:'POST',
headers:{
'Content-Type':'text/plain;charset=utf-8'
},
body:JSON.stringify({
nombre,telefono,marca,tipo,fecha
})
});

mostrarEstado('Contacto guardado','success');

// ✅ ENVÍO AUTOMÁTICO
await enviarWhatsApp(telefono, mensaje);

setTimeout(cargarContactos,1000);

}catch(error){
console.log(error);
mostrarEstado('Error guardando contacto','error');
}
}


// ✅ BOTÓN ENVIAR AHORA
async function enviarAhora(telefono,nombre,marca){

const mensaje = generarMensaje(nombre, marca);

await enviarWhatsApp(telefono, mensaje);

mostrarEstado('Mensaje enviado ✅','success');
}


// ✅ RENDER TABLA
function render(){

const tabla = document.getElementById('tabla');
tabla.innerHTML='';

if(contactos.length === 0){
tabla.innerHTML=`<tr><td colspan="6">No hay contactos</td></tr>`;
return;
}

contactos.forEach(c=>{
tabla.innerHTML += `
<tr>
<td>${c.nombre || ''}</td>
<td>${c.telefono || ''}</td>
<td>${c.marca || ''}</td>
<td>${c.tipo || ''}</td>
<td>${c.fecha || ''}</td>
<td>
<button onclick="enviarAhora('${c.telefono}','${c.nombre}','${c.marca}')">
📲 Enviar ahora
</button>
</td>
</tr>
`;
});
}


// ✅ INICIO
window.onload = function(){
cargarContactos();
setInterval(cargarContactos,30000);
};

</script>

</body>
</html>
