<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Happy Moments</title>

<style>
body{font-family:sans-serif;background:#f4f5fb;padding:20px;}
.container{max-width:1000px;margin:auto;background:white;padding:20px;border-radius:20px;}

.banner img{
  width:100%;
  height:160px;
  object-fit:contain;
  border-radius:12px;
}

.tabs{display:flex;gap:10px;margin-bottom:20px;justify-content:center;}
.tab{padding:10px 15px;background:#ddd;border-radius:8px;cursor:pointer;}
.tab.active{background:#7e22ce;color:white;}

.section{display:none;}
.section.active{display:block;}

input, textarea, select{
  width:100%;
  padding:10px;
  margin-top:10px;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}
.save{background:#7e22ce;}
.send{background:#16a34a;}
.delete{background:#dc2626;}
.sheet{background:#15803d;}

table{width:100%;margin-top:20px;border-collapse:collapse;}
td,th{padding:10px;border-bottom:1px solid #ddd;}

#contenedorGaleria{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:10px;
}
#contenedorGaleria img,
#contenedorGaleria video{
  width:100%;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<!-- ✅ LOGO -->
<div class="banner">
  <img src="https://shaggyvision.github.io/pruebawhats/logo.png">
</div>

<!-- ✅ TABS -->
<div class="tabs">
  <div class="tab active" data-tab="contacto">Contacto</div>
  <div class="tab" data-tab="plantilla">Plantilla</div>
  <div class="tab" data-tab="lista">Contactos</div>
  <div class="tab" data-tab="plantillas">Plantillas</div>
  <div class="tab" data-tab="galeria">Galería</div>
</div>

<!-- ✅ CONTACTO -->
<div id="contacto" class="section active">
<h3>Agregar contacto</h3>

<input id="nombre">
<input id="telefono">

<select id="marca">
<option>ADMIN</option><option>ADO</option><option>SUR</option><option>TRT</option>
</select>

<input type="date" id="fecha">

<div style="display:flex;justify-content:space-between;">
<button class="save" onclick="agregarContacto()">Guardar</button>
<button class="sheet" onclick="window.open('https://docs.google.com/spreadsheets/d/1nojKLQL2J4OZlrf2zxPHWuSwagHR8etSYrC7Pvrus4g/edit')">
Sheets
</button>
</div>
</div>

<!-- ✅ PLANTILLA -->
<div id="plantilla" class="section">
<h3>Plantillas</h3>

<select id="marcaPlantilla">
<option>ADMIN</option><option>ADO</option><option>SUR</option><option>TRT</option>
</select>

<textarea id="textoPlantilla">Hola {Nombre}</textarea>
<input id="urlMedia">

<button class="save" onclick="guardarPlantilla()">Guardar</button>
</div>

<!-- ✅ CONTACTOS -->
<div id="lista" class="section">
<table>
<thead>
<tr><th>Nombre</th><th>Tel</th><th>Área</th><th>Fecha</th><th></th></tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<!-- ✅ PLANTILLAS -->
<div id="plantillas" class="section">
<table>
<thead>
<tr><th>Área</th><th>Mensaje</th><th>Media</th><th></th></tr>
</thead>
<tbody id="tablaPlantillas"></tbody>
</table>
</div>

<!-- ✅ GALERIA -->
<div id="galeria" class="section">
<h3>Galería</h3>
<div id="contenedorGaleria"></div>
</div>

</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbzUX-hDUuKcj_we3d9GHsT8MCm0W0Er-nYKHqZsZigpmk1S6zWAuYMtPiFRV4uDjc0m/exec";

let contactos=[],plantillas=[],galeria=[];

//////////////////////////////////////////////////
document.addEventListener("DOMContentLoaded", ()=>{

document.querySelectorAll(".tab").forEach(tab=>{
tab.onclick=()=>{

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
tab.classList.add("active");

document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(tab.dataset.tab).classList.add("active");

};
});

cargarContactos();
cargarPlantillas();
cargarGaleria();
});

//////////////////////////////////////////////////
async function cargarContactos(){
let r=await fetch(SCRIPT_URL);
contactos=await r.json();
render();
}

function render(){
let t=document.getElementById("tabla");
t.innerHTML="";
contactos.forEach(c=>{
t.innerHTML+=`
<tr>
<td>${c.nombre}</td>
<td>${c.telefono}</td>
<td>${c.marca}</td>
<td>${c.fecha}</td>
<td>
<button class="send" onclick="enviarAhora('${c.telefono}','${c.nombre}','${c.marca}')">📲</button>
<button class="delete" onclick="borrarContacto('${c.telefono}')">🗑</button>
</td>
</tr>`;
});
}

//////////////////////////////////////////////////
async function cargarPlantillas(){
let r=await fetch(SCRIPT_URL+"?tipo=plantillas");
plantillas=await r.json();
renderPlantillas();
}

function renderPlantillas(){
let t=document.getElementById("tablaPlantillas");
t.innerHTML="";
plantillas.forEach(p=>{
t.innerHTML+=`
<tr>
<td>${p.marca}</td>
<td>${p.plantilla}</td>
<td>${p.archivo||""}</td>
<td><button class="delete" onclick="borrarPlantilla('${p.marca}')">🗑</button></td>
</tr>`;
});
}

//////////////////////////////////////////////////
// ✅ GALERIA
//////////////////////////////////////////////////
async function cargarGaleria(){
let r=await fetch(SCRIPT_URL+"?tipo=galeria");
galeria=await r.json();
renderGaleria();
}

function renderGaleria(){
let cont=document.getElementById("contenedorGaleria");
cont.innerHTML="";

galeria.forEach(item=>{

if(item.tipo.includes("image")){
cont.innerHTML+=`<img src="${item.url}o.includes("video")){
cont.innerHTML+=`<video src="${item.url}" controls/script>
</body>
</html>
