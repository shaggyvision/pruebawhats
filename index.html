<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Happy Moments PRO</title>

<style>
body{font-family:sans-serif;background:#f4f5fb;padding:20px;}
.container{max-width:1000px;margin:auto;background:white;padding:20px;border-radius:20px;}

.tabs{display:flex;gap:10px;margin-bottom:20px;}
.tab{
  padding:10px;
  background:#ddd;
  cursor:pointer;
  border-radius:8px;
}
.tab.active{
  background:#7e22ce;
  color:white;
}

.section{display:none;}
.section.active{display:block;}
</style>
</head>

<body>

<div class="container">

<h2>CRM con Pestañas</h2>

<div class="tabs">
  <div class="tab active" data-tab="contacto">Contacto</div>
  <div class="tab" data-tab="plantilla">Plantilla</div>
  <div class="tab" data-tab="lista">Contactos</div>
  <div class="tab" data-tab="plantillasLista">Plantillas</div>
</div>

<!-- SECCIONES -->
<div id="contacto" class="section active">
  <h3>Agregar contacto</h3>
</div>

<div id="plantilla" class="section">
  <h3>Crear plantilla</h3>
</div>

<div id="lista" class="section">
  <h3>Lista contactos</h3>
</div>

<div id="plantillasLista" class="section">
  <h3>Lista plantillas</h3>
</div>

</div>

<script>

//////////////////////////////////////////////////
// ✅ ESPERAR QUE CARGUE TODO EL HTML
//////////////////////////////////////////////////
document.addEventListener("DOMContentLoaded", function(){

  const tabs = document.querySelectorAll(".tab");

  tabs.forEach(function(tab){

    tab.addEventListener("click", function(){

      // Quitar activo a todos
      tabs.forEach(t => t.classList.remove("active"));

      // Activar actual
      tab.classList.add("active");

      // Ocultar todas las secciones
      document.querySelectorAll(".section").forEach(sec=>{
        sec.classList.remove("active");
      });

      // Mostrar la seleccionada
      const id = tab.getAttribute("data-tab");
      document.getElementById(id).classList.add("active");

    });

  });

});

</script>

</body>
</html>
