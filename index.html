<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Happy Moments</title>

<style>
body{font-family:sans-serif;background:#f4f5fb;padding:20px;}
.container{max-width:1000px;margin:auto;background:white;padding:20px;border-radius:20px;}

.banner img{
  width:100%;
  height:160px;
  object-fit:contain;
  border-radius:12px;
}

.tabs{display:flex;gap:10px;margin-bottom:20px;justify-content:center;}
.tab{padding:10px 15px;background:#ddd;border-radius:8px;cursor:pointer;}
.tab.active{background:#7e22ce;color:white;}

.section{display:none;}
.section.active{display:block;}

input, textarea, select{
  width:100%;
  padding:10px;
  margin-top:10px;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}
.save{background:#7e22ce;}
.send{background:#16a34a;}
.delete{background:#dc2626;}
.sheet{background:#15803d;}

table{width:100%;margin-top:20px;border-collapse:collapse;}
td,th{padding:10px;border-bottom:1px solid #ddd;}

#contenedorGaleria{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:10px;
}
</style>
</head>

<body>

<div class="container">

<!-- ✅ LOGO BIEN -->
<div class="banner">
  <img src="https://shaggyvision.github.io/pruebawhats/logo.png">
</div>

<!-- ✅ TABS -->
<div class="tabs">
  <div class="tab active" data-tab="contacto">Contacto</div>
  <div class="tab" data-tab="plantilla">Plantilla</div>
  <div class="tab" data-tab="lista">Contactos</div>
  <div class="tab" data-tab="plantillas">Plantillas</div>
  <div class="tab" data-tab="galeria">Galería</div>
</div>

<!-- CONTACTO -->
<div id="contacto" class="section active">
<h3>Agregar contacto</h3>

<input id="nombre">
<input id="telefono">

<select id="marca">
<option>ADMIN</option>
<option>ADO</option>
</select>

<input type="date" id="fecha">

<button onclick="agregarContacto()">Guardar</button>
</div>

<!-- CONTACTOS -->
<div id="lista" class="section">
<table>
<tbody id="tabla"></tbody>
</table>
</div>

<!-- PLANTILLAS -->
<div id="plantillas" class="section"></div>

<!-- GALERIA -->
<div id="galeria" class="section">
<h3>Galería</h3>
<div id="contenedorGaleria"></div>
</div>

</div>

<script>

const URL="https://script.google.com/macros/s/AKfycbzUX-hDUuKcj_we3d9GHsT8MCm0W0Er-nYKHqZsZigpmk1S6zWAuYMtPiFRV4uDjc0m/exec";

//////////////////////////////////////////////////
// ✅ TABS (NUNCA FALLAN)
//////////////////////////////////////////////////
document.querySelectorAll(".tab").forEach(tab=>{
tab.onclick=()=>{

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
tab.classList.add("active");

document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(tab.dataset.tab).classList.add("active");

};
});

//////////////////////////////////////////////////
// CONTACTOS (NO ROMPE)
//////////////////////////////////////////////////
async function agregarContacto(){

fetch(URL,{
method:"POST",
body:JSON.stringify({
nombre:nombre.value,
telefono:telefono.value,
marca:marca.value,
fecha:fecha.value
})
});
}

// ✅ carga contactos con seguridad
(async ()=>{
try{
let r=await fetch(URL);
let data=await r.json();

let t=document.getElementById("tabla");
data.forEach(c=>{
t.innerHTML += `<tr><td>${c.nombre}</td></tr>`;
});
}catch(e){
console.log("no contactos");
}
})();

//////////////////////////////////////////////////
// ✅ GALERIA SEGURA (AISLADA)
//////////////////////////////////////////////////
(function(){

fetch(URL+"?tipo=galeria")
.then(r=>r.json())
.then(data=>{

let cont=document.getElementById("contenedorGaleria");

data.forEach(item=>{

if(item.tipo.includes("image")){
cont.innerHTML+=`<img src="${item.urlcludes("video")){
cont.innerHTML+=`<video src="${item.url}" controls.catch(()=>console.log("galeria no disponible"));

})();

</script>

</body>
</html>
