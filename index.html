<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Moments CRM</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#f4f5fb;
margin:0;
padding:40px;
}

.container{
max-width:1200px;
margin:auto;
background:white;
padding:30px;
border-radius:24px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
color:#7e22ce;
margin-bottom:10px;
}

.card{
background:#faf7ff;
padding:20px;
border-radius:20px;
margin-top:20px;
}

input,textarea,select{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #ddd;
margin-top:10px;
margin-bottom:15px;
font-size:15px;
box-sizing:border-box;
}

button{
padding:14px 20px;
border:none;
background:#7e22ce;
color:white;
border-radius:14px;
cursor:pointer;
font-weight:600;
transition:.2s;
}

button:hover{
opacity:.9;
transform:scale(1.02);
}

.btn-delete{
background:#ef4444;
padding:10px 14px;
border-radius:10px;
font-size:13px;
}

.btn-test{
background:#22c55e;
margin-top:10px;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
padding:14px;
border-bottom:1px solid #eee;
text-align:left;
font-size:14px;
}

.status{
padding:10px;
border-radius:12px;
margin-top:15px;
font-size:14px;
font-weight:500;
display:none;
}

.success{
background:#dcfce7;
color:#166534;
}

.error{
background:#fee2e2;
color:#991b1b;
}

@media(max-width:768px){

body{
padding:15px;
}

table{
font-size:12px;
display:block;
overflow-x:auto;
}

}

</style>
</head>

<body>

<div class="container">

<h1>🎉 Happy Moments CRM</h1>

<div class="card">
<h2>UltraMSG conectado automáticamente</h2>
<p><b>Instancia:</b> instance174263</p>
</div>

<div class="card">

<h2>Agregar contacto</h2>

<input type="text" id="nombre" placeholder="Nombre">

<input type="text" id="telefono" placeholder="WhatsApp 521XXXXXXXXXX">

<select id="tipo">
<option value="cumpleaños">Cumpleaños</option>
<option value="aniversario">Aniversario</option>
</select>

<input type="date" id="fecha">

<button onclick="agregar()">Agregar contacto</button>

</div>

<div class="card">

<h2>Plantilla automática</h2>

<textarea id="mensaje" rows="5">🎉 Hola {nombre}, Happy Moments y Mobility ADO te desean un excelente día.</textarea>

<button onclick="guardarPlantilla()">Guardar plantilla</button>

<button class="btn-test" onclick="enviarPrueba()">
Enviar mensaje de prueba
</button>

<div id="estado" class="status"></div>

</div>

<div class="card">

<h2>Contactos</h2>

<table>

<thead>

<tr>
<th>Nombre</th>
<th>WhatsApp</th>
<th>Evento</th>
<th>Fecha</th>
<th>Acción</th>
</tr>

</thead>

<tbody id="tabla"></tbody>

</table>

</div>

</div>

<script>

const instance = 'instance174263';
const token = 'a7hqz1tofhwq65b4';

let contactos = JSON.parse(localStorage.getItem('contactos')) || [];

const estado = document.getElementById('estado');

function mostrarEstado(texto,tipo){

estado.style.display='block';

estado.className=`status ${tipo}`;

estado.innerText=texto;

setTimeout(()=>{
estado.style.display='none';
},4000);

}

async function enviarWhatsApp(numero,mensaje){

try{

const response = await fetch(`https://api.ultramsg.com/${instance}/messages/chat`,{
method:'POST',
headers:{
'Content-Type':'application/x-www-form-urlencoded'
},
body:new URLSearchParams({
token:token,
to:numero,
body:mensaje
})
});

const data = await response.json();

console.log(data);

return true;

}catch(error){

console.log(error);

return false;

}

}

async function agregar(){

const nombre = document.getElementById('nombre').value.trim();

const telefono = document.getElementById('telefono').value.trim();

const tipo = document.getElementById('tipo').value;

const fecha = document.getElementById('fecha').value;

if(!nombre || !telefono || !fecha){

mostrarEstado('Completa todos los campos','error');

return;

}

contactos.push({
nombre,
telefono,
tipo,
fecha
});

localStorage.setItem('contactos',JSON.stringify(contactos));

render();

const plantilla = localStorage.getItem('plantilla') || document.getElementById('mensaje').value;

const mensaje = plantilla.replace('{nombre}',nombre);

const enviado = await enviarWhatsApp(telefono,mensaje);

if(enviado){

mostrarEstado('Contacto agregado y mensaje enviado','success');

}else{

mostrarEstado('Contacto agregado pero hubo error enviando mensaje','error');

}

document.getElementById('nombre').value='';
document.getElementById('telefono').value='';
document.getElementById('fecha').value='';

}

function eliminarContacto(index){

if(confirm('¿Eliminar este contacto?')){

contactos.splice(index,1);

localStorage.setItem('contactos',JSON.stringify(contactos));

render();

mostrarEstado('Contacto eliminado','success');

}

}

function render(){

const tabla = document.getElementById('tabla');

tabla.innerHTML='';

if(contactos.length===0){

tabla.innerHTML=`
<tr>
<td colspan="5">No hay contactos registrados</td>
</tr>
`;

return;

}

contactos.forEach((c,index)=>{

tabla.innerHTML += `
<tr>

<td>${c.nombre}</td>

<td>${c.telefono}</td>

<td>${c.tipo}</td>

<td>${c.fecha}</td>

<td>
<button 
class="btn-delete"
onclick="eliminarContacto(${index})">
🗑️ Eliminar
</button>
</td>

</tr>
`;

});

}

function guardarPlantilla(){

const mensaje = document.getElementById('mensaje').value;

localStorage.setItem('plantilla',mensaje);

mostrarEstado('Plantilla guardada','success');

}

async function enviarPrueba(){

const telefono = prompt('Ingresa un número para prueba');

if(!telefono) return;

const plantilla = localStorage.getItem('plantilla') || document.getElementById('mensaje').value;

const mensaje = plantilla.replace('{nombre}','Usuario');

const enviado = await enviarWhatsApp(telefono,mensaje);

if(enviado){

mostrarEstado('Mensaje de prueba enviado','success');

}else{

mostrarEstado('Error enviando prueba','error');

}

}

function verificarEventos(){

const hoy = new Date();

const mes = String(hoy.getMonth()+1).padStart(2,'0');

const dia = String(hoy.getDate()).padStart(2,'0');

const hoyFormato = `${mes}-${dia}`;

const plantilla = localStorage.getItem('plantilla') || document.getElementById('mensaje').value;

contactos.forEach(async contacto=>{

const fecha = contacto.fecha.substring(5);

const llaveEnvio = `enviado_${contacto.telefono}_${hoyFormato}`;

if(fecha === hoyFormato && !localStorage.getItem(llaveEnvio)){

const mensaje = plantilla.replace('{nombre}',contacto.nombre);

await enviarWhatsApp(contacto.telefono,mensaje);

localStorage.setItem(llaveEnvio,'si');

console.log('Mensaje automático enviado a',contacto.nombre);

}

});

}

setInterval(verificarEventos,60000);

render();

</script>

</body>
</html>
